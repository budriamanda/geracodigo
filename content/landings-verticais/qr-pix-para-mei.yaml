conteudoExtra: |
  ## Por que MEI escolhe Pix em vez de maquininha

  Maquininha cobra de 1,5% a 4% por venda no débito/crédito e o dinheiro demora 1 a 30 dias para cair. Com Pix, o cliente escaneia o QR, paga, e em segundos você tem o dinheiro — sem taxa, sem parcelamento e sem dor de cabeça.

  Para serviços simples, produtos de baixo ticket ou delivery próprio, o QR Code Pix é quase sempre a melhor opção. A maquininha continua fazendo sentido quando o cliente quer parcelar ou só tem cartão.

  ## Como colocar o QR Code no seu balcão

  Depois de gerar o QR com o botão acima, imprima em **pelo menos 5 × 5 cm** e plastifique. Se preferir, mande para uma gráfica imprimir em adesivo — fica mais durável. Cole em local visível: balcão, mesa, totem ou junto do maquininha (se você usa as duas).

  Teste sempre antes: abra seu próprio app de banco, escaneie e confirme que os dados aparecem corretos.
