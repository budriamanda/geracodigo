oQueETitle: "O que é o GeraCode?"
oQueEContent: "O **GeraCode** reúne 6 ferramentas gratuitas de códigos para **lojistas, empreendedores e pequenos negócios brasileiros**. Com 6 ferramentas integradas, você pode gerar códigos de barras em 12 formatos (EAN-13, Code 128, Code 93, UPC-A, ITF-14, Codabar e mais), QR Codes genéricos, **QR Code Pix** com payload BR Code EMV válido, ler códigos de barras pela câmera e criar códigos SKU padronizados.\n\nDiferente de outras ferramentas, o GeraCode processa tudo localmente no seu dispositivo. Nenhuma informação é enviada para servidores, garantindo **total privacidade e segurança**. Inclui funcionalidades como **geração em lote, download em PDF, impressão de etiquetas, cálculo automático do dígito verificador (CRC16 para Pix)** e **histórico local**. Tudo 100% no navegador, sem depender de servidores externos."

comoFuncionaTitle: "Como funciona"
comoFuncionaSteps:
  - step: "1"
    titulo: "Escolha a ferramenta"
    descricao: "Selecione o que precisa: código de barras (12 formatos), QR Code Pix, QR Code genérico, leitor de código de barras ou gerador de SKU."
  - step: "2"
    titulo: "Preencha os dados"
    descricao: "Insira as informações necessárias. Personalize cores, tamanhos e estilos. O preview é gerado automaticamente em tempo real."
  - step: "3"
    titulo: "Baixe, imprima ou copie"
    descricao: "Download em PNG, SVG ou PDF. Gere em lote e baixe em ZIP. Imprima etiquetas. Copie códigos para a área de transferência."

