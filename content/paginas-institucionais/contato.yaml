bodyMarkdown: |
  O GeraCode é mantido por Amanda Budri. Se você tiver dúvidas, encontrou um erro ou quer sugerir um conteúdo, entre em contato pelo e-mail abaixo.

  ## E-mail de Contato

  [amandabudric@gmail.com](mailto:amandabudric@gmail.com)

  Respondo em até 2 dias úteis.

  ---

  ## Para qual assunto devo entrar em contato?

  ### Erro em ferramenta ou geração incorreta
  Se um código de barras, QR Code ou QR Pix gerado apresentou problema, inclua na mensagem:
  - O dado de entrada utilizado (número, chave Pix, URL etc.)
  - Uma captura de tela do resultado inesperado
  - O navegador e dispositivo que estava usando

  ### Correção ou atualização de conteúdo
  Se encontrou uma informação desatualizada ou incorreta em algum artigo do blog:
  - Informe a URL da página
  - Descreva o trecho incorreto
  - Se possível, indique a fonte oficial que embasa a correção

  ### Sugestão de ferramenta ou tema
  Tem uma ideia de ferramenta ou assunto que faria diferença para o seu negócio? Adoramos ouvir sugestões de lojistas, MEI e empreendedores.

  ### Parcerias e outros assuntos
  Para parcerias, divulgações ou outros assuntos, envie uma mensagem com uma descrição breve da proposta.
