bodyMarkdown: |
  Dois usos de QR Code dominam restaurantes brasileiros: o **cardápio digital** nas mesas e o **QR Code Pix** no balcão ou na comanda. São QR Codes diferentes, criados de formas diferentes — e misturá-los é um erro comum que confunde o cliente. Este guia explica cada um.

  ## QR Code de cardápio: como funciona

  O QR Code de cardápio é simplesmente um link (URL) codificado em QR Code. Quando o cliente escaneia, o celular abre o link — que pode ser:

  - Um **PDF do cardápio** hospedado no Google Drive ou Dropbox
  - Uma página no **Google Sites**, Notion ou site próprio
  - Uma plataforma de cardápio digital como iFood Shop, Goomer, Anotaí ou similar
  - Um link do **Instagram** ou **WhatsApp** com o menu fixado

  A forma mais simples e gratuita: crie um PDF do cardápio, faça upload no Google Drive, ajuste o compartilhamento para "qualquer pessoa com o link pode ver" e use esse link no QR Code.

  ### Criando o QR Code de cardápio no GeraCode

  1. Abra o [gerador de QR Code do GeraCode](/gerador-de-qr-code).
  2. Cole o link do seu cardápio na caixa de texto. Inclua sempre o `https://`.
  3. Ajuste o tamanho (pelo menos 3 × 3 cm para uso em mesa).
  4. Baixe em **SVG** se vai imprimir, ou **PNG** para uso digital.

  > **Dica:** use um link permanente para o cardápio. Se você trocar o link depois de já ter impresso centenas de QR Codes, todos os códigos impressos param de funcionar. O QR Code estático não permite alterar o destino depois de impresso.

  ### Opção com QR Code dinâmico

  Se você atualiza o cardápio frequentemente e não quer reimprimir os QR Codes toda vez, considere um **QR Code dinâmico** — que aponta para um servidor e permite trocar o destino sem trocar o código impresso. Plataformas como Goomer, Abrahão e iFood Shop oferecem cardápio digital com QR Code dinâmico incluído.

  Para uso simples (cardápio que muda pouco), o QR Code estático do GeraCode resolve sem custo.

  ## QR Code Pix: para receber pagamentos

  O **QR Code Pix** é um código completamente diferente — ele contém os dados da sua chave Pix num formato específico chamado BR Code EMV, definido pelo Banco Central do Brasil. Não é um link; é um payload de pagamento.

  Quando o cliente escaneia com o app do banco, ele vai direto para a tela de pagamento com os seus dados preenchidos.

  ### Criando o QR Code Pix

  Use o [gerador de QR Code Pix do GeraCode](/gerador-de-qr-code-pix):

  1. Selecione o tipo de chave (CNPJ é recomendado para estabelecimentos formalizados).
  2. Digite a chave, o nome do estabelecimento (até 25 caracteres) e a cidade.
  3. **Valor:** deixe em branco para que o cliente informe o valor, ou fixe se o ticket é sempre o mesmo.
  4. Baixe em SVG para impressão ou PNG para WhatsApp e redes sociais.

  O código gerado segue o padrão BR Code EMV do Banco Central e funciona em todos os bancos participantes do Pix. Para entender mais: [gerador de PIX grátis — guia completo](/blog/gerador-pix-gratis-como-criar-qr-code-pix).

  ### PIX estático vs. dinâmico no restaurante

  | Situação | Use Pix estático | Use Pix dinâmico |
  |---|---|---|
  | Comanda com valor variável | ✓ (cliente digita o valor) | ✓ (valor gerado por comanda) |
  | Volume baixo a médio de pagamentos | ✓ | — |
  | Precisa confirmar pagamento automaticamente | — | ✓ |
  | Integração com sistema de PDV | — | ✓ |
  | Custo | Zero | Depende do banco/sistema |

  Para a maioria dos restaurantes de pequeno e médio porte, o **Pix estático** resolve bem: o cliente paga, você confere no app do banco. O Pix dinâmico faz sentido quando o volume é alto e a conciliação manual se torna inviável.

  ## Não confunda os dois QR Codes na mesa

  Um erro frequente: colocar o QR Code Pix e o QR Code de cardápio no mesmo suporte, sem identificar qual é qual. O cliente escaneia o Pix achando que é o cardápio — e vai parar na tela de pagamento. Resultado: confusão e desconfiança.

  **Solução simples:** identifique claramente cada QR Code com um rótulo:
  - 🍽️ **"Acesse o cardápio"** — aponta para o cardápio digital
  - 💰 **"Pague via Pix"** — aponta para o QR Code Pix

  Use ícones e cores diferentes para que o cliente entenda à primeira olhada.

  ## Onde posicionar e como imprimir

  ### Na mesa (cardápio)
  - **Porta-cardápio acrílico de mesa** — dura mais que papel e não amassa. Encontrado em papelarias e lojas de embalagens por R$ 5–15 a unidade.
  - **Tamanho mínimo**: 5 × 5 cm para leitura confortável à distância de 30–50 cm.
  - **Plastifique** se não tiver acrílico — umidade e gordura degradam o papel.

  ### No balcão (Pix)
  - Imprima em **tamanho A5 (14,8 × 21 cm)** para visibilidade máxima.
  - Plastifique ou use suporte de balcão.
  - Coloque em local visível para quem está em frente ao caixa, não em ângulo.

  ### Dicas de impressão
  - Use **SVG** no arquivo — não perde qualidade em nenhum tamanho.
  - **Impressora laser** produz barras mais nítidas que jato de tinta.
  - Fundo branco e código escuro: evite fundos coloridos.
  - **Teste antes de imprimir em quantidade**: escaneie com seu próprio celular e com o de outra pessoa.

  ## Como manter os QR Codes funcionando

  **Cardápio:** se o link mudar (troca de plataforma, PDF reuploadado com URL diferente), reimprima todos os QR Codes. Anote o link em algum lugar seguro antes de criar o QR.

  **Pix:** o QR Code Pix estático não expira enquanto a chave Pix estiver ativa no banco. Se você trocar a chave Pix ou mudar de banco, gere um novo QR Code e reimprima.

  **Manutenção periódica:** uma vez por mês, escaneie todos os QR Codes do estabelecimento para garantir que ainda funcionam. Um QR Code ilegível ou com destino errado passa despercebido por semanas se ninguém verificar.

  ## QR Code com pedido automático: o próximo passo do cardápio digital

  O QR Code de cardápio tradicional apenas mostra o menu — o cliente lê e pede verbalmente ao garçom. A evolução natural é o **QR Code com self-ordering**: o cliente escaneia, visualiza o cardápio, faz o pedido e paga, tudo no próprio celular, sem interagir com a equipe.

  Como funciona:
  1. O QR Code em cada mesa aponta para um sistema de pedidos online vinculado àquela mesa específica.
  2. O cliente navega pelo cardápio digital, adiciona itens ao carrinho e confirma o pedido.
  3. O pedido aparece automaticamente na tela da cozinha ou no tablet do garçom.
  4. O pagamento pode ser feito pelo próprio app (cartão, Pix integrado) ou na mesa ao final.

  **Plataformas brasileiras com self-ordering por QR Code:**
  - **Anota AI:** integra cardápio digital, pedido e PDV. A partir de R$99/mês, com suporte a iFood e Rappi.
  - **Saipos / Go Cheff:** sistema de gestão completo com cardápio digital e QR por mesa.
  - **Abrahão:** focado em food service, com integração com balanças e sistemas de comanda.
  - **iFood Shop:** para estabelecimentos já na plataforma iFood, permite pedido na mesa integrado ao painel do restaurante.

  **Para quem vale o investimento:** estabelecimentos com mais de 5–10 mesas e alto giro de clientes. O self-ordering reduz erros de anotação, acelera o tempo de saída do pedido e permite que a equipe se concentre em atendimento, não em tomar pedidos.

  Para a maioria dos restaurantes pequenos, o QR Code de cardápio estático (GeraCode + Google Drive) ainda é a melhor relação custo-benefício. O self-ordering é o passo seguinte quando o volume justifica.

  ## A trinca do restaurante moderno: cardápio + Pix + Wi-Fi

  Restaurantes bem equipados têm três QR Codes diferentes, cada um com função clara:

  | QR Code | Função | Fica onde |
  |---|---|---|
  | Cardápio digital | Link para o menu | Em cada mesa |
  | Pix | Pagamento | Balcão / comanda / mesa |
  | Wi-Fi | Senha da rede | Mesa + balcão + recepção |

  Os três devem ter **rótulos claros e visuais distintos** para evitar confusão. Uma boa solução: um suporte de mesa triplo ou um cartão com os três QR Codes identificados com ícones (prato para cardápio, símbolo Pix para pagamento, símbolo Wi-Fi para internet).

  Para o Wi-Fi, crie uma **rede de convidados separada** — os clientes acessam a internet sem ver os dispositivos da rede operacional do restaurante (caixas, tablets de pedido, câmeras). Veja como criar: [QR Code para Wi-Fi](/blog/qr-code-wifi-como-criar).

  ## QR Code por mesa: como organizar e numerar

  Restaurantes com sistema de pedido digital ou delivery de mesa precisam identificar qual mesa fez qual pedido. O QR Code pode conter o número da mesa no link:

  - Crie um link diferente para cada mesa: `https://seusite.com/cardapio?mesa=5`
  - O sistema de pedido recebe o parâmetro `mesa=5` e já associa o pedido à mesa correta
  - Gere um QR Code separado para cada mesa no [gerador de QR Code](/gerador-de-qr-code)

  Se você usa plataformas como Goomer, Abrahão ou iFood Shop, elas já têm essa funcionalidade de QR Code por mesa — cada código é único e rastreável.

  **Organização prática:** numere os QR Codes impressos durante a geração, salve os SVGs nomeados (`mesa-01.svg`, `mesa-02.svg`) e guarde todos em uma pasta para facilitar a reimpressão de apenas as mesas danificadas.

  ## Integrando com delivery: iFood, Rappi e Uber Eats

  Se o restaurante opera nas plataformas de delivery, o QR Code pode direcionar para a página do estabelecimento no app — mas com uma ressalva importante:

  - **iFood:** cada estabelecimento tem uma URL pública como `https://ifood.com.br/delivery/sua-cidade/nome-restaurante`. Gere um QR Code com esse link.
  - **Rappi e Uber Eats:** funcionam da mesma forma — copie o link da página do estabelecimento no app ou no site e use no QR Code.

  **Atenção:** links de plataformas de delivery podem mudar. Use um encurtador de link (bit.ly, Dub.co) como intermediário — assim você pode atualizar o destino sem reimprimir os QR Codes.

  Uma estratégia eficaz: o QR Code no balcão leva para uma página do próprio site do restaurante com botões para todos os canais (delivery, WhatsApp, reservas). Você controla a página e nunca precisa trocar o QR Code impresso.

  ## Coleta de feedback via QR Code

  O QR Code é uma forma prática de coletar avaliações de clientes antes de eles saírem:

  - **Google Business Profile:** copie o link de avaliação do seu estabelecimento no Google Maps e gere um QR Code. Coloque na conta ou na nota fiscal — "Gostou? Avalie no Google!"
  - **Formulário Google:** crie um formulário de satisfação no Google Forms (NPS, avaliação do prato, sugestão) e gere o QR Code com o link. As respostas ficam em planilha acessível.
  - **TripAdvisor / iFliid:** mesma lógica — link para avaliação direto no QR Code.

  Clientes satisfeitos raramente avaliam espontaneamente. Um QR Code na conta, com chamada para ação clara ("Avalie nossa pizza — leva 30 segundos"), aumenta o volume de avaliações positivas sem custo adicional.

  ## Custo: plataforma paga vs. solução gratuita

  Restaurantes frequentemente se deparam com plataformas que cobram mensalidade por QR Code de cardápio. Comparativo:

  | Solução | Custo | Quando faz sentido |
  |---|---|---|
  | GeraCode + Google Drive (PDF) | Grátis | Cardápio que muda pouco; até ~50 mesas |
  | GeraCode + Google Sites | Grátis | Cardápio visual sem programação |
  | Goomer / Abrahão | R$100–300/mês | Pedido digital + integração com PDV |
  | iFood Shop | Taxa por pedido | Delivery + pedido na mesa integrado |
  | QR Code dinâmico (plataforma paga) | R$30–100/mês | Atualização frequente de cardápio sem reimprimir |

  Para a maioria dos restaurantes de pequeno porte, a combinação **GeraCode + Google Drive** resolve: cardápio em PDF atualizado no Drive, QR Code estático do GeraCode impresso nas mesas. Custo: zero.

  ## Próximos passos

  - Para criar o QR Code do cardápio: [gerador de QR Code](/gerador-de-qr-code).
  - Para criar o QR Code Pix: [gerador de QR Code Pix](/gerador-de-qr-code-pix).
  - Quer entender como o QR Code funciona por dentro? [Como funciona o QR Code](/blog/qr-code-como-funciona-guia-completo).
