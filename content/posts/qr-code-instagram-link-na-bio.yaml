bodyMarkdown: |
  QR Code para Instagram é a ponte entre o mundo físico e o seu perfil: o cliente vê o produto, escaneia o QR Code e já está na sua página — sem precisar digitar @, buscar na lupa ou soletrar o arroba. Para negócios que vendem no mundo físico e querem seguidores no Instagram, é uma das conversões mais baratas que existe.

  ## O que é QR Code para Instagram e por que criar um

  Um QR Code para Instagram (chamado de **"tag de nome"** ou **"nametag"** nas versões antigas do app, agora renomeado para "QR Code" pelo próprio Instagram) é um código que, quando escaneado com a câmera do celular, abre diretamente o seu perfil no app do Instagram ou no navegador. Você cola o link do seu perfil (`https://instagram.com/seuperfil`) dentro do QR Code e qualquer pessoa com celular consegue acessar sem digitar nada.

  **Por que funciona melhor do que pedir para "seguir no Instagram":**

  - Fricção zero: não precisa sair do contexto para buscar o perfil
  - Sem erro de digitação do @
  - Funciona na câmera nativa do iPhone (iOS 11+) e Android (8+) sem instalar nada
  - Você controla onde o QR Code aparece — embalagem, cardápio, vitrine, cartão de visita

  Para negócios com ponto físico, estima-se que menos de 3% dos clientes que ouvem "nos siga no Instagram" de fato seguem. Com QR Code visível na embalagem ou balcão, a taxa de conversão sobe porque o esforço é mínimo.

  ## Como criar QR Code para o Instagram gratuitamente

  O processo leva menos de 2 minutos com o [gerador de QR Code do GeraCode](/gerador-de-qr-code):

  1. Vá ao seu perfil no Instagram e copie o link: `https://www.instagram.com/seuperfil/`
  2. Acesse o [gerador de QR Code](/gerador-de-qr-code).
  3. Cole o link no campo de texto.
  4. Ajuste as cores se quiser combinar com a identidade visual da marca (opcional).
  5. Clique em **Gerar QR Code**.
  6. Baixe em **SVG** para impressão ou **PNG** para uso digital.

  **Dica:** use o link com `www` para garantir compatibilidade máxima com todos os leitores. Evite o link do aplicativo (`instagram://`) — ele só funciona quando o app está instalado.

  ### Qual link usar no QR Code do Instagram?

  | Formato | Funciona em | Recomendado |
  |---|---|---|
  | `https://www.instagram.com/seuperfil/` | Celular, computador, qualquer leitor | ✅ Sim |
  | `https://instagram.com/seuperfil` | Celular e computador | ✅ Sim |
  | `instagram://user?username=seuperfil` | Só com app instalado | ❌ Não |

  Use sempre o link `https://` — é o formato que funciona em qualquer dispositivo, com ou sem o app do Instagram instalado.

  ## QR Code para link na bio: como criar uma página com vários links

  O Instagram permite apenas um link na bio. Para quem tem loja, site, WhatsApp, cardápio e outras páginas, a solução é criar uma **página de links** e colocar o QR Code apontando para ela — não para o perfil.

  **Ferramentas gratuitas para criar página de links:**

  | Ferramenta | Gratuito | Domínio próprio | Análise de cliques |
  |---|---|---|---|
  | **Linktree** | Sim (básico) | Não | Sim (básico) |
  | **Bio.link** | Sim | Não | Sim |
  | **Beacons.ai** | Sim | Não | Sim |
  | **Carrd.co** | Sim (1 página) | Sim (pago) | Não |
  | **Página própria no site** | Depende da plataforma | Sim | Sim (Google Analytics) |

  **Para lojistas no Shopify, WooCommerce ou Wix:** crie uma página `/links` ou `/bio` no seu próprio site e coloque o QR Code apontando para ela. Você mantém os visitantes no seu domínio e pode rastrear com Google Analytics sem depender de terceiros.

  O QR Code aponta para o link da página (ex: `https://linktree.ee/seuperfil`) — o processo de geração é idêntico ao do perfil.

  ## Onde colocar o QR Code do Instagram por tipo de negócio

  ### Loja de roupas e acessórios

  - **Etiqueta do produto:** QR Code pequeno (1,5 × 1,5 cm) com texto "Siga para ver os looks" ou "Ver mais no Instagram".
  - **Sacola de compras:** lateral ou fundo da sacola, com a frase "Compartilhe sua compra e nos marque".
  - **Vitrine:** adesivo no vidro na altura dos olhos, especialmente quando a loja está fechada e tem movimento na rua.
  - **Provador:** banner ou adesivo com QR Code e hashtag da marca — o cliente está num momento de atenção ao produto.

  ### Restaurante e delivery

  - **Cardápio físico:** canto do cardápio ou contracapa, com "Veja os pratos do dia no Instagram".
  - **Embalagem de delivery:** adesivo na embalagem ou impressão na caixa, com "Abriu? Filma e nos marca!".
  - **Mesa:** totem ou cartão ao lado do QR Code do Pix, separado para não confundir.
  - **Recibo:** rodapé do cupom ou nota com o QR Code.

  ### Produtos artesanais e e-commerce

  - **Embalagem de envio:** adesivo ou carimbo no lado externo da caixa.
  - **Cartão dentro da caixa:** "Obrigada pela compra! Nos siga para ver novidades → [QR Code]".
  - **Tag do produto:** junto ao QR Code de informações do produto ou cuidados.

  ### Prestadores de serviço (salão, estética, consultório)

  - **Cartão de visita:** verso do cartão com QR Code do Instagram e/ou link de agendamento.
  - **Recibo e comprovante:** rodapé com QR Code e frase curta.
  - **Espelho ou parede do ambiente:** adesivo durante o atendimento, quando o cliente está esperando.

  ## Tamanho mínimo para impressão

  Para que a câmera consiga ler o QR Code com facilidade:

  | Distância de leitura | Tamanho mínimo do QR Code |
  |---|---|
  | Na mão (embalagem, cartão) | 2 × 2 cm |
  | Balcão ou mesa | 4 × 4 cm |
  | Vitrine ou parede (a 50 cm) | 6 × 6 cm |
  | Banner ou totem (a 1 m+) | 10 × 10 cm ou mais |

  Sempre use o arquivo **SVG** para impressão — ele é vetorial e não perde qualidade em nenhum tamanho. O PNG funciona para uso digital (stories, posts), mas pode ficar pixelado se ampliado para impressão.

  ## QR Code personalizado com a logo do Instagram

  Você pode colocar a logo do Instagram (ou da sua marca) no centro do QR Code. Os QR Codes têm redundância embutida: até 30% do código pode estar coberto e ele ainda é lido corretamente.

  No [gerador de QR Code do GeraCode](/gerador-de-qr-code), você pode personalizar:
  - Cor das barras (combine com a identidade visual)
  - Cor do fundo
  - Logo ou ícone no centro (upload de imagem)
  - Estilo dos módulos (quadrado ou arredondado)

  **Cuidados com QR Code personalizado:**
  - Sempre teste com 3 câmeras diferentes após customizar
  - Não use cores muito claras para as barras (contraste baixo = falha de leitura)
  - A logo no centro não deve ultrapassar 25% da área do QR Code
  - Fundo branco ou muito claro funciona melhor — evite fundos escuros

  ## Como medir quantas pessoas escanearam o QR Code

  QR Codes estáticos (gerados gratuitamente) não têm rastreamento nativo. Para medir cliques, use um link com **UTM parameters**:

  1. Monte o link assim: `https://www.instagram.com/seuperfil/?utm_source=qrcode&utm_medium=embalagem&utm_campaign=maio2026`
  2. Cole esse link no gerador de QR Code.
  3. No Google Analytics, vá em **Aquisição → Campanhas** para ver os acessos vindos do QR Code.

  Cada QR Code pode ter UTMs diferentes por ponto de contato (embalagem, cartão, vitrine) — assim você sabe qual converte mais.

  **Alternativa gratuita:** use um encurtador de links como **bit.ly** (plano gratuito) para criar o link antes do QR Code. O bit.ly mostra quantas vezes o link foi clicado sem precisar de Google Analytics.

  ## QR Code para post, reel ou produto específico

  Além do QR Code do perfil, você pode criar QR Codes que apontam diretamente para conteúdos específicos — sem passar pela página principal do perfil:

  - **Post ou reel específico:** copie o link do post (toque nos três pontos → "Copiar link") e gere o QR Code com essa URL. Útil para campanhas: "Escaneie para ver o tutorial completo".
  - **Produto na loja do Instagram (Instagram Shopping):** copie o link direto do produto na vitrine do Instagram e coloque no QR Code da embalagem. O cliente vai direto para a página de compra.
  - **Story salvo como destaque:** não dá para linkar diretamente, mas você pode criar um link para um post fixado no perfil que redireciona para o conteúdo.
  - **Link do WhatsApp via bio:** se você usa o link do WhatsApp na bio do Instagram, crie um QR Code diretamente para o WhatsApp (`https://wa.me/5511999999999`) — mais direto e sem depender do Instagram como intermediário.

  Para criar QR Code de qualquer URL do Instagram: [gerador de QR Code do GeraCode](/gerador-de-qr-code).

  ## QR Code do Instagram vs. QR Code nativo do app

  O próprio Instagram tem um QR Code nativo (acessível em Perfil → Menu → QR Code). A diferença:

  | | QR Code do GeraCode | QR Code nativo do Instagram |
  |---|---|---|
  | Funciona sem abrir o app | ✅ Sim (abre no navegador) | ❌ Só com app instalado |
  | Personalização visual | ✅ Completa (cor, logo) | Limitada (só temas prontos) |
  | Rastreamento com UTM | ✅ Sim | ❌ Não |
  | Exportação em SVG | ✅ Sim | ❌ PNG apenas |
  | Custo | Grátis | Grátis |

  Para impressão profissional e rastreamento, o QR Code gerado externamente (com link `https://`) é superior ao QR Code nativo do Instagram.

  ## Erros comuns ao criar QR Code para Instagram

  **Usar o link do app (`instagram://`):** funciona apenas em celulares com o Instagram instalado. Usuários sem o app ou que escaneiam no computador recebem erro. Use sempre `https://www.instagram.com/seuperfil/`.

  **QR Code impresso muito pequeno:** abaixo de 2 × 2 cm, câmeras de celular comum falham. Qualquer QR Code em embalagem pequena deve ter pelo menos esse tamanho.

  **Fundo escuro com barras coloridas:** o leitor precisa de contraste entre as barras e o fundo. Barras escuras em fundo branco (ou brancas em fundo escuro) funcionam; barras coloridas em fundo colorido geralmente falham.

  **Não testar antes de imprimir em escala:** sempre escaneie o QR Code com pelo menos dois celulares diferentes (Android + iPhone) antes de mandar para a gráfica ou imprimir etiquetas em lote. A [central de ajuda do Instagram](https://help.instagram.com/973587816542868) explica como o recurso nativo de QR Code do perfil funciona para referência.

  **Link com @ em vez de URL:** o @ é um atalho para mencionar dentro do Instagram, não um link externo. O QR Code precisa de uma URL completa com `https://`.

  ## Exemplos de frase para colocar perto do QR Code

  O QR Code sem texto ao lado tem taxa de escaneamento menor — as pessoas precisam entender o que vai acontecer:

  - "Escaneie e siga no Instagram"
  - "Siga para ver novidades → [QR Code]"
  - "Compartilhe sua compra e nos marque no Instagram"
  - "Veja os pratos do dia: [QR Code]"
  - "Nos encontre em @seuperfil ou escaneie:"
  - "Conteúdo exclusivo no Instagram → [QR Code]"

  Frases curtas e diretas performam melhor. O usuário decide em menos de 2 segundos se vai escanear ou não.
