bodyMarkdown: |
  Quantas vezes por dia alguĂŠm te pede a senha do Wi-Fi? Em um cafĂŠ, hotel ou escritĂłrio, um QR Code de Wi-Fi resolve isso: o cliente aponta o celular, escaneia e se conecta automaticamente â sem digitar nada, sem errar a senha.

  Mas o QR Code de Wi-Fi nĂŁo ĂŠ um link. Ele usa um formato tĂŠcnico especĂ­fico que os sistemas operacionais conhecem. Este guia explica o formato correto, como criar, onde imprimir e em quais dispositivos funciona.

  ## Como funciona o QR Code de Wi-Fi

  O QR Code de Wi-Fi nĂŁo abre um site â ele codifica um texto no formato **WIFI:** que os sistemas operacionais iOS e Android reconhecem nativamente como uma instruĂ§ĂŁo de conexĂŁo. Quando a cĂ˘mera detecta esse formato, ela exibe uma notificaĂ§ĂŁo "Conectar Ă  rede [nome]" e completa a autenticaĂ§ĂŁo automaticamente.

  O formato completo ĂŠ:

  ```
  WIFI:T:WPA;S:nome-da-rede;P:senha-aqui;;
  ```

  Onde:
  - **T** = tipo de seguranĂ§a: `WPA` (para WPA2 e WPA3), `WEP` (obsoleto, evite) ou `nopass` (rede aberta)
  - **S** = SSID, o nome da rede Wi-Fi (case sensitive)
  - **P** = senha (omita para redes abertas)
  - Os dois ponto-e-vĂ­rgula finais (`;;`) fecham o payload

  O [gerador de QR Code do GeraCode](/gerador-de-qr-code) tem um modo especĂ­fico para Wi-Fi que monta esse formato automaticamente â vocĂŞ preenche os campos e o cĂłdigo ĂŠ gerado sem risco de erro de digitaĂ§ĂŁo.

  ## Compatibilidade com iOS e Android

  | Sistema operacional | VersĂŁo mĂ­nima | Como funciona |
  |---|---|---|
  | iOS | 11 (2017) | CĂ˘mera nativa lĂŞ e exibe notificaĂ§ĂŁo de conexĂŁo |
  | Android | 10 (2019) | CĂ˘mera nativa lĂŞ; versĂľes anteriores precisam de app |
  | Android 9 ou anterior | â | Requer app de leitura de QR Code (ex: Google Lens) |
  | Windows 10/11 | â | App "CĂ˘mera" lĂŞ mas nĂŁo conecta automaticamente |

  Para a grande maioria dos clientes hoje (2026), a cĂ˘mera nativa jĂĄ resolve. Dispositivos muito antigos podem precisar de um app adicional â mas esses representam menos de 5% do uso, segundo dados de adoĂ§ĂŁo do Android publicados pelo Google.

  ### Redes com seguranĂ§a WPA3

  Redes com WPA3 usam o mesmo valor `T:WPA` no formato WIFI: â o dispositivo negocia o protocolo correto automaticamente. NĂŁo existe campo especĂ­fico para WPA3 no padrĂŁo de QR Code de Wi-Fi.

  ## Criando o QR Code de Wi-Fi no GeraCode

  1. Abra o [gerador de QR Code](/gerador-de-qr-code).
  2. Selecione o tipo **Wi-Fi**.
  3. Preencha: nome da rede (SSID), senha e tipo de seguranĂ§a (WPA/WPA2/WPA3 â selecione WPA).
  4. Se a rede ĂŠ oculta (SSID nĂŁo aparece na lista de redes), marque a opĂ§ĂŁo "Rede oculta".
  5. Baixe em **SVG** para impressĂŁo ou **PNG** para uso digital.

  > **AtenĂ§ĂŁo com caracteres especiais:** se a senha ou o SSID contĂŠm `;`, `"`, `:` ou `\`, esses caracteres precisam ser escapados com `\` no payload WIFI:. O gerador do GeraCode cuida disso automaticamente. Se vocĂŞ montar o formato na mĂŁo, lembre-se da regra.

  ## Onde imprimir e posicionar

  ### Em cafĂŠs, restaurantes e padarias
  - **Mesa ou balcĂŁo**: porta-cartĂŁo acrĂ­lico (A7 ou A6), com o texto "Wi-Fi grĂĄtis â escaneie para conectar" e o nome da rede abaixo do cĂłdigo.
  - Tamanho mĂ­nimo do QR Code: **3 Ă 3 cm** para leitura a 30 cm de distĂ˘ncia.
  - Inclua o nome e a senha por extenso abaixo do QR Code â para quem nĂŁo conseguir escanear.

  ### Em hotĂŠis e pousadas
  - Imprima em **cartĂŁo de boas-vindas** (tamanho cartĂŁo de crĂŠdito, frente e verso).
  - Uma face: QR Code de Wi-Fi. Outra face: telefone da recepĂ§ĂŁo, cĂłdigo do quarto, informaĂ§Ăľes de checkout.
  - Plastifique para durabilidade.

  ### Em escritĂłrios e coworkings
  - Cole na parede prĂłxima Ă  recepĂ§ĂŁo ou sala de reuniĂŁo.
  - Tamanho A6 (10,5 Ă 14,8 cm) ĂŠ visĂ­vel e legĂ­vel de 1 metro de distĂ˘ncia.

  ## Erros comuns e como evitar

  **Senha ou SSID com caractere especial nĂŁo escapado.** Se o SSID ĂŠ `CafĂŠ & Cia`, o `&` precisa estar correto no payload. Use o gerador em vez de montar o texto na mĂŁo.

  **Trocar a senha do Wi-Fi sem reimprimir.** O QR Code de Wi-Fi ĂŠ estĂĄtico â ele contĂŠm a senha literal. Se vocĂŞ mudar a senha do roteador, todos os QR Codes impressos param de funcionar. Guarde o arquivo SVG para reimprimir rapidamente.

  **Rede oculta sem marcar a opĂ§ĂŁo.** Redes com SSID oculto precisam do campo `H:true` no payload. Sem isso, o dispositivo nĂŁo encontra a rede mesmo com a senha correta.

  **QR Code muito pequeno.** Em ambientes com luz baixa (restaurante noturno, balcĂŁo escuro), o leitor precisa de mais ĂĄrea. Use pelo menos 4 Ă 4 cm nesses casos.

  **Fundo colorido ou imagem atrĂĄs do cĂłdigo.** O QR Code de Wi-Fi segue as mesmas regras de impressĂŁo de qualquer QR Code: fundo branco, mĂłdulos escuros, zona de silĂŞncio ao redor.

  ## Devo incluir a senha em texto junto com o QR Code?

  Sim â mas avalie o contexto. Em ambientes onde a senha ĂŠ semipĂşblica (cafĂŠ, sala de espera), incluir a senha por extenso ĂŠ conveniente para usuĂĄrios com dispositivos mais antigos. Em ambientes corporativos onde a senha ĂŠ controlada, imprima apenas o QR Code e instrua a recepĂ§ĂŁo a fornecer a senha pessoalmente quando necessĂĄrio.

