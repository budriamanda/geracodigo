bodyMarkdown: |
  QR Code para cardápio digital é uma imagem que o cliente escaneia com o celular e abre o menu do restaurante na tela. Sem papel, sem espera, sem app para instalar.

  Este guia mostra como criar o QR Code do seu cardápio de graça, qual link usar, onde colocar no estabelecimento e como combinar com pagamento via PIX.

  > **Resumo rápido**
  > - O QR Code aponta para um link -- você escolhe o destino (PDF, site, WhatsApp)
  > - Criar é grátis e leva menos de 2 minutos no GeraCode
  > - Baixe em SVG para impressão e PNG para uso digital
  > - Coloque em mesa, balcão, vitrine e embalagem de delivery
  > - Combine com QR Code PIX para o cliente pagar sem maquininha

  ## O que é QR Code para cardápio digital

  O QR Code para cardápio digital é uma imagem quadrada com pontos que, ao ser escaneada pela câmera do celular, abre um link automaticamente. Esse link leva ao menu do restaurante.

  O QR Code em si não guarda o cardápio. Ele guarda apenas um endereço. É como uma placa que aponta o caminho: o cliente escaneia, o celular abre o link, o cardápio aparece.

  Isso significa que você pode atualizar o conteúdo do cardápio sem trocar o QR Code -- desde que o endereço do link permaneça o mesmo. Se você usar um PDF no Google Drive e substituir o arquivo mantendo o mesmo link, o QR Code impresso continua funcionando.

  > **Atenção**: O QR Code estático (o tipo gerado pelo GeraCode) guarda o link diretamente na imagem. Se você mudar o endereço do cardápio, precisará gerar e reimprimir um novo QR Code. Por isso, escolha bem o link antes de imprimir em quantidade.

  ## O que o QR Code do cardápio deve apontar?

  Antes de gerar o QR Code, você precisa ter o link do cardápio. As opções mais comuns para restaurantes:

  **PDF no Google Drive**

  Salve o cardápio em PDF no Google Drive, configure o arquivo como "qualquer pessoa com o link pode ver" e copie esse endereço. É gratuito, fácil de atualizar e funciona em qualquer celular. A desvantagem: o PDF abre em visualizador do Google, que pode ser lento em conexões ruins.

  **Página do site ou plataforma de cardápio digital**

  Se você usa Cardápio Web, GrandChef, Anota AI ou tem um site próprio, copie o link do cardápio e use diretamente. Essa é a opção mais profissional.

  **Link do perfil no iFood ou Rappi**

  Funciona, mas tem uma ressalva: o cliente vai parar no app de delivery, não no cardápio físico. Serve para delivery, não é o ideal para uso dentro do estabelecimento.

  **WhatsApp Business com catálogo**

  Se você tem catálogo de produtos configurado no WhatsApp Business, um link `wa.me/55SEUNUMERO` leva o cliente direto para a conversa. Funciona bem para lanchonetes e deliveries informais.

  **Página de links (Linktree ou similar)**

  Para quem quer apontar para mais de uma coisa -- cardápio, PIX, WhatsApp, redes sociais -- uma página de links resolve. O cliente escaneia e escolhe o destino.

  Carla, dona de uma lanchonete em Campinas, tentou usar o link do iFood na mesa. Os clientes escaneavam, o app abria, eles se perdiam entre as opções de delivery e iam embora sem pedir. Ela trocou para um PDF simples no Google Drive e o problema acabou. Moral: o link certo depende de onde o cliente vai usar o QR Code.

  ## Como criar QR Code para cardápio digital grátis

  Com o link do cardápio em mãos, o processo leva menos de 2 minutos:

  1. Acesse o [gerador de QR Code do GeraCode](/gerador-de-qr-code).
  2. Cole o link do cardápio no campo de URL.
  3. Ajuste cor e tamanho se quiser (o padrão preto e branco tem a maior taxa de leitura).
  4. Clique em **Gerar QR Code**.
  5. Baixe em **SVG** para impressão ou **PNG** para usar em telas e redes sociais.

  Sem cadastro. Sem app. Funciona direto no navegador, no celular ou no computador.

  Use o [gerador de QR Code grátis do GeraCode](/gerador-de-qr-code) para criar o seu agora.

  > **Antes de imprimir em quantidade**: teste o QR Code com pelo menos dois celulares diferentes, um Android e um iPhone. Escaneie com a câmera nativa, sem aplicativo adicional. Se os dois abrirem o link correto, pode imprimir.

  ## Onde colocar o QR Code no restaurante

  A posição do QR Code define se o cliente vai usá-lo ou ignorá-lo.

  **Mesa**

  O lugar mais eficiente. O cliente senta, vê o QR Code e escaneia enquanto espera. Imprima em papel plastificado ou acrílico de mesa. Tamanho mínimo: 5 x 5 cm.

  **Balcão e caixa**

  Para pedidos no balcão e para clientes que querem conferir o cardápio antes de decidir.

  **Vitrine e entrada**

  Muita gente decide entrar ou não com base no cardápio. Um QR Code na vitrine com a legenda "Veja nosso cardápio" captura quem passa na calçada.

  **Embalagem e saquinho de delivery**

  O cliente recebe o pedido e já encontra o QR Code para o próximo pedido. Uma etiqueta adesiva 5 x 5 cm no fundo da embalagem já resolve.

  **Parede e banners**

  Para estabelecimentos maiores, com área de espera ou mezanino. Imprima em tamanho maior (mínimo 10 x 10 cm para leitura à distância).

  João, dono de uma pizzaria em São Paulo, colocou o QR Code apenas nas mesas. Funcionou bem para quem já estava sentado, mas ele continuava perdendo clientes que paravam na calçada para ver o cardápio e iam embora sem entrar. Depois de colocar um QR Code na vitrine com o texto "Nosso cardápio aqui", o movimento de clientes novos aumentou nas primeiras duas semanas.

  ## QR Code de cardápio e QR Code PIX: usando os dois juntos

  Muitos restaurantes colocam dois QR Codes na mesa: um para o cardápio, outro para pagar via PIX. Eles funcionam de forma independente:

  - **QR Code de cardápio**: aponta para o link do menu. Gere com o [gerador de QR Code](/gerador-de-qr-code).
  - **QR Code PIX**: contém os dados da sua chave PIX. O cliente escaneia e o valor cai direto na sua conta. Gere com o [gerador de QR Code PIX](/gerador-de-qr-code-pix).

  A combinação elimina o ciclo de entregar cardápio, recolher cardápio, chamar o garçom, trazer a maquininha. O cliente consulta o menu, pede, consome e paga pelo celular.

  Imprima os dois lado a lado com rótulos claros ("Cardápio" e "Pagar via PIX") no mesmo suporte acrílico de mesa. Custo do suporte: menos de R$ 5 na maioria das gráficas rápidas.

  Para restaurantes que ainda não aceitam PIX sem maquininha, veja o guia completo de [QR Code PIX para MEI](/blog/qr-code-pix-para-mei-guia-completo) -- o processo é o mesmo para qualquer CNPJ.

  ## Dicas para o QR Code do cardápio funcionar sempre

  **Use SVG para impressão**

  O SVG é um formato vetorial: não perde qualidade ao ampliar. Se você imprimir um QR Code PNG em tamanho grande, ele pode ficar pixelado e difícil de ler. SVG resolve esse problema.

  **Fundo branco, QR escuro**

  A combinação padrão tem a maior taxa de leitura. Evite QR Code colorido em fundo escuro para uso físico -- em condições de pouca luz, câmeras de celular têm dificuldade.

  **Mantenha a margem ao redor**

  O QR Code precisa de uma área branca ao redor, chamada de "zona quieta". Não recorte a imagem rente à borda nem coloque texto muito próximo.

  **Link curto melhora a leitura**

  URLs longas geram QR Codes com mais pontos, mais densos e mais difíceis de ler em baixa resolução. Se o link do seu cardápio for extenso, use um encurtador gratuito como Bitly ou TinyURL antes de gerar o QR Code.

  **Atualize o conteúdo, não o link**

  Se você precisar mudar pratos ou preços, atualize o PDF ou a página que o QR Code aponta -- sem mexer no link. Assim, os QR Codes já impressos continuam funcionando.

  ## Quanto custa criar um QR Code para cardápio?

  Gerar o QR Code é gratuito. O GeraCode não cobra nada, sem limite de geração, sem cadastro obrigatório.

  O único custo possível é a impressão física. Para começar:

  - **Impressão caseira em papel A4 + plastificação com fita transparente**: grátis ou quase.
  - **Gráfica rápida em papel couché plastificado**: R$ 1 a R$ 3 por unidade em quantidade.
  - **Suporte acrílico de mesa com QR Code impresso**: R$ 5 a R$ 15, dependendo do fornecedor.

  Para testar a solução antes de investir, a impressão caseira já resolve. Quando funcionar bem, você manda para a gráfica.

  ## QR Code para cardápio resolve mesmo?

  Sim, com uma condição: o cardápio do outro lado precisa funcionar bem no celular.

  Um PDF bem formatado abre sem problema. Uma página de site responsiva, melhor ainda. O que não funciona é um PDF escaneado de baixa resolução, que o cliente precisa dar zoom infinito para ler.

  Se você ainda não tem um cardápio digital, a opção mais rápida é criar um PDF no Canva (gratuito), salvar no Google Drive e usar esse link no QR Code. Em menos de uma hora você tem tudo no ar.

  Para restaurantes que já têm sistema de cardápio digital, o QR Code é só a ponte entre o papel e a tela -- e essa ponte o GeraCode cria em 2 minutos.

  ## Como criar seu QR Code agora

  1. Copie o link do cardápio (Google Drive, site, plataforma de cardápio digital).
  2. Acesse o [gerador de QR Code do GeraCode](/gerador-de-qr-code).
  3. Cole o link, gere e baixe em SVG.
  4. Imprima, plastifique e coloque na mesa.

  Se quiser também aceitar PIX sem maquininha, gere o [QR Code PIX](/gerador-de-qr-code-pix) e coloque lado a lado na mesa. Sem cadastro, sem mensalidade, sem app.
