bodyMarkdown: |
  QR Code para cardápio digital é uma imagem que o cliente escaneia com o celular e abre o menu do restaurante na tela. Sem papel, sem espera, sem app para instalar.

  Este guia mostra como criar o QR Code do seu cardápio de graça, qual link usar, onde colocar no estabelecimento e como combinar com pagamento via PIX.

  > **Resumo rápido**
  > - O QR Code aponta para um link: você escolhe o destino (PDF, site, WhatsApp)
  > - Criar é grátis e leva menos de 2 minutos no GeraCode
  > - Baixe em SVG para impressão e PNG para uso digital
  > - Coloque em mesa, balcão, vitrine e embalagem de delivery
  > - Combine com QR Code PIX para o cliente pagar sem maquininha

  ## O que é QR Code para cardápio digital

  O QR Code para cardápio digital é uma imagem quadrada com pontos que, ao ser escaneada pela câmera do celular, abre um link automaticamente. Esse link leva ao menu do restaurante.

  O QR Code em si não guarda o cardápio. Ele guarda apenas um endereço. É como uma placa que aponta o caminho: o cliente escaneia, o celular abre o link, o cardápio aparece.

  Cardápios digitais com fotos dos pratos têm impacto direto no ticket médio: o cliente tende a pedir mais quando consegue visualizar o prato antes de decidir. Segundo a [ABRASEL](https://abrasel.com.br) (Associação Brasileira de Bares e Restaurantes), a digitalização do cardápio é uma das principais ferramentas de redução de custo operacional no setor. Estabelecimentos que atualizam preços com frequência eliminam completamente o custo recorrente de impressão ao migrar para o cardápio digital. O QR Code é o elo entre o impresso e o digital: você imprime o código uma vez e atualiza o conteúdo quantas vezes quiser.

  ## O que o QR Code do cardápio deve apontar?

  Antes de gerar o QR Code, você precisa ter o link do cardápio. A escolha do destino define se o QR Code vai precisar ser reimpresso no futuro ou não.

  | Destino | Custo | Melhor para | Troca o QR se atualizar? |
  |---|---|---|---|
  | PDF no Google Drive | Grátis | Início rápido, cardápio simples | Não, se o link não mudar |
  | Site próprio ou plataforma | Grátis a pago | Visual profissional, com fotos | Não |
  | Plataforma de cardápio (Menu Legal, Abrahão) | Grátis no básico | Cardápio interativo com pedido | Não (QR dinâmico) |
  | iFood / Rappi | Grátis (com conta) | Delivery | Não recomendado para uso físico |
  | WhatsApp Business com catálogo | Grátis | Delivery informal | Não |

  **PDF no Google Drive** é a opção mais rápida para começar. Salve o cardápio em PDF, configure como "qualquer pessoa com o link pode ver" e copie o endereço. A desvantagem: o PDF abre no visualizador do Google, que pode ser lento em conexões ruins.

  **Plataforma de cardápio digital** (Menu Legal, Abrahão, Cardápio Web) oferece a experiência mais profissional, com fotos, categorias e pedido direto pelo celular. A maioria tem plano gratuito para começar.

  **WhatsApp Business com catálogo** funciona para lanchonetes e deliveries informais. Um link `wa.me/55SEUNUMERO` leva o cliente direto para a conversa.

  Carla, dona de uma lanchonete em Campinas, tentou usar o link do iFood na mesa. Os clientes escaneavam, o app abria, eles se perdiam entre as opções de delivery e iam embora sem pedir. Ela trocou para um PDF simples no Google Drive e o problema acabou. Moral: o link certo depende de onde o cliente vai usar o QR Code.

  ## QR Code de cardápio estático ou dinâmico?

  Esta é a dúvida mais comum antes de imprimir: se eu mudar o cardápio, preciso trocar o QR Code?

  Depende do tipo:

  **QR Code estático** (o que o GeraCode gera) guarda o link diretamente na imagem. Se você mudar o endereço do cardápio, precisa gerar e reimprimir um novo QR Code. Funciona bem para quem usa um link fixo: domínio próprio, Google Drive bem organizado ou plataforma com URL permanente.

  **QR Code dinâmico** é gerado por plataformas específicas de cardápio digital. O link que o cliente escaneia é um intermediário gerenciado pela plataforma. Você pode mudar o destino final sem trocar a imagem impressa. A maioria cobra mensalidade para manter o serviço ativo.

  Para a maioria dos restaurantes, o QR Code estático resolve sem custo. A chave é escolher um link que não vai mudar. Se você atualizar o conteúdo do PDF mantendo o mesmo arquivo no Drive, o QR Code continua funcionando.

  Entenda a diferença completa em [QR Code estático vs dinâmico: qual usar?](/blog/qr-code-dinamico-vs-estatico).

  ## Como criar QR Code para cardápio digital grátis

  Com o link do cardápio em mãos, o processo leva menos de 2 minutos:

  1. Acesse o [gerador de QR Code do GeraCode](/gerador-de-qr-code).
  2. Cole o link do cardápio no campo de URL.
  3. Ajuste cor e tamanho se quiser (o padrão preto e branco tem a maior taxa de leitura).
  4. Clique em **Gerar QR Code**.
  5. Baixe em **SVG** para impressão ou **PNG** para telas e redes sociais.

  Sem cadastro. Sem app. Funciona direto no navegador, no celular ou no computador.

  > **Antes de imprimir em quantidade**: teste o QR Code com pelo menos dois celulares diferentes, um Android e um iPhone. Escaneie com a câmera nativa, sem aplicativo adicional. Se os dois abrirem o link correto, pode imprimir.

  ## Onde colocar o QR Code no restaurante

  A posição define se o cliente vai usar o QR Code ou ignorá-lo.

  **Mesa** é o lugar mais eficiente. O cliente senta, vê o QR Code e escaneia enquanto espera. Imprima em papel plastificado ou acrílico de mesa. Tamanho mínimo: 5 x 5 cm.

  **Balcão e caixa** serve para pedidos no balcão e para clientes que querem conferir o cardápio antes de decidir.

  **Vitrine e entrada** capturam quem passa na calçada. Muita gente decide entrar ou não com base no cardápio. Um QR Code na vitrine com a legenda "Veja nosso cardápio" resolve isso.

  **Embalagem e saquinho de delivery**: o cliente recebe o pedido e já encontra o QR Code para o próximo pedido. Uma etiqueta adesiva 5 x 5 cm no fundo da embalagem já resolve.

  **Parede e banners** funcionam para estabelecimentos maiores com área de espera. Imprima em tamanho maior: mínimo 10 x 10 cm para leitura à distância.

  João, dono de uma pizzaria em São Paulo, colocou o QR Code apenas nas mesas. Funcionou bem para quem já estava sentado, mas ele continuava perdendo clientes que paravam na calçada, conferiam o cardápio e iam embora sem entrar. Depois de colocar um QR Code na vitrine com o texto "Nosso cardápio aqui", o movimento de clientes novos aumentou nas primeiras duas semanas.

  ## QR Code de cardápio e QR Code PIX: usando os dois juntos

  Muitos restaurantes colocam dois QR Codes na mesa: um para o cardápio, outro para pagar via PIX. Eles funcionam de forma independente:

  - **QR Code de cardápio**: aponta para o link do menu. Gere com o [gerador de QR Code](/gerador-de-qr-code).
  - **QR Code PIX**: contém os dados da sua chave PIX. O cliente escaneia e o valor cai direto na sua conta. Gere com o [gerador de QR Code PIX](/gerador-de-qr-code-pix).

  O QR Code PIX segue o padrão [BR Code EMV definido pelo Banco Central do Brasil](https://www.bcb.gov.br/estabilidadefinanceira/pix), aceito por todos os bancos e fintechs participantes do sistema.

  A combinação elimina o ciclo de entregar cardápio, recolher cardápio, chamar o garçom, trazer a maquininha. O cliente consulta o menu, pede, consome e paga pelo celular.

  Imprima os dois lado a lado com rótulos claros ("Cardápio" e "Pagar via PIX") no mesmo suporte acrílico de mesa. Custo do suporte: menos de R$ 5 na maioria das gráficas rápidas.

  Para restaurantes que ainda não aceitam PIX sem maquininha, veja o guia completo de [QR Code PIX para MEI](/blog/qr-code-pix-para-mei-guia-completo).

  ## Dicas para o QR Code do cardápio funcionar sempre

  **Use SVG para impressão**: o SVG é um formato vetorial e não perde qualidade ao ampliar. Se você imprimir um QR Code PNG em tamanho grande, pode ficar pixelado e difícil de ler.

  **Fundo branco, QR escuro**: a combinação padrão tem a maior taxa de leitura. Evite QR Code colorido em fundo escuro para uso físico.

  **Mantenha a margem ao redor**: o QR Code precisa de uma área branca ao redor, chamada de "zona quieta". Não recorte a imagem rente à borda.

  **Link curto melhora a leitura**: URLs longas geram QR Codes mais densos e difíceis de ler. Use um encurtador gratuito como Bitly se o link do cardápio for extenso.

  **Ofereça WiFi aos clientes**: o QR Code abre um link online, então o cliente precisa de internet. Se o sinal de celular for fraco no estabelecimento, compartilhe a senha do WiFi. Você pode criar um [QR Code de WiFi](/blog/qr-code-wifi-como-criar) e colocar junto ao QR do cardápio.

  **Atualize o conteúdo, não o link**: se precisar mudar pratos ou preços, atualize o PDF ou a página sem mexer no endereço. Assim, os QR Codes já impressos continuam funcionando.

  ## Quanto custa criar um QR Code para cardápio?

  Gerar o QR Code é gratuito. O GeraCode não cobra nada, sem limite de geração, sem cadastro obrigatório.

  O único custo possível é a impressão física:

  - **Impressão caseira em papel A4 plastificado**: grátis ou quase.
  - **Gráfica rápida em papel couché plastificado**: R$ 1 a R$ 3 por unidade em quantidade.
  - **Suporte acrílico de mesa com QR Code**: R$ 5 a R$ 15, dependendo do fornecedor.

  Para testar antes de investir, a impressão caseira já resolve. Quando funcionar bem, você manda para a gráfica.

  ## Perguntas frequentes

  **Preciso trocar o QR Code se mudar o cardápio?**

  Só se o link mudar. Se você atualizar o conteúdo do PDF ou do site mantendo o mesmo endereço, o QR Code impresso continua funcionando. Para nunca precisar reimprimir, use uma plataforma de cardápio digital com QR dinâmico.

  **O cliente precisa de internet para ver o cardápio?**

  Sim. O QR Code abre um link online, então o cliente precisa de acesso à internet pelo plano de dados ou pelo WiFi do estabelecimento. Oferecer a senha do WiFi via [QR Code de WiFi](/blog/qr-code-wifi-como-criar) resolve o problema com elegância.

  **QR Code de cardápio funciona em qualquer celular?**

  Sim. iOS e Android leem QR Code com a câmera nativa sem precisar de app adicional. Funciona desde o iOS 11 (2017) e Android 9 (2018) em diante.

  **Posso usar o mesmo QR Code para cardápio e PIX?**

  Não. São dois QR Codes com funções diferentes. Um aponta para o link do cardápio; o outro contém os dados da sua chave PIX. O ideal é colocar os dois lado a lado na mesa com rótulos claros.

  **O QR Code do GeraCode tem validade?**

  Não. O QR Code estático funciona enquanto o link de destino estiver no ar. Não expira e não requer renovação ou mensalidade.

  ## Como criar seu QR Code agora

  1. Copie o link do cardápio (Google Drive, site, plataforma de cardápio digital).
  2. Acesse o [gerador de QR Code do GeraCode](/gerador-de-qr-code).
  3. Cole o link, gere e baixe em SVG.
  4. Imprima, plastifique e coloque na mesa.

  Se quiser também aceitar PIX sem maquininha, gere o [QR Code PIX](/gerador-de-qr-code-pix) e coloque lado a lado na mesa. Sem cadastro, sem mensalidade, sem app.
