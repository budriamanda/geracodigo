bodyMarkdown: |
  O PIX (sistema de pagamento instantâneo do Banco Central) virou o método de pagamento mais usado no Brasil, com mais de 60 bilhões de transações em 2024. A forma mais prática de receber em loja, restaurante ou pelo WhatsApp é com um QR Code fixo: o cliente escaneia, confirma o valor no banco e o dinheiro cai na hora. Este guia mostra como usar um gerador de PIX grátis para criar o seu em menos de 2 minutos, sem cadastro.

  Use o [gerador de QR Code PIX do GeraCode](/gerador-de-qr-code-pix) direto no navegador. Sem instalar nada, sem criar conta.

  ## QR Code PIX vs. código Copia e Cola: qual a diferença?

  São duas formas de representar o mesmo pagamento:

  - **QR Code PIX**: imagem escaneada pela câmera do app do banco. Ideal para balcão, cardápio, vitrine e cartazetes impressos.
  - **Código Copia e Cola (BR Code EMV)**: sequência de texto que o cliente cola na área "PIX Copia e Cola" do banco. Ideal para WhatsApp, e-mail e lojas virtuais onde o cliente não consegue escanear uma imagem na tela.

  O gerador do GeraCode produz os dois ao mesmo tempo. Você baixa a imagem do QR Code e copia o código de texto: mesma cobrança, dois formatos prontos para usar.

  ## O que você precisa antes de gerar o QR Code PIX

  Apenas três informações obrigatórias:

  1. **Chave PIX cadastrada no banco**: CPF, CNPJ, e-mail, número de celular ou chave aleatória.
  2. **Nome do recebedor**: até 25 caracteres. Use o nome fantasia em vez da razão social completa.
  3. **Cidade**: exigida pelo padrão BR Code EMV do Banco Central.

  Dois campos opcionais que valem a pena considerar:

  - **Valor fixo**: preencha se você cobra sempre o mesmo valor (mensalidade, delivery fixo, combo). Deixe em branco para o cliente digitar o valor no banco.
  - **Descrição da cobrança**: aparece no comprovante do pagador. Útil para identificar pedidos.

  ## Passo a passo: como gerar QR Code PIX grátis

  1. Acesse o [gerador de QR Code PIX](/gerador-de-qr-code-pix).
  2. Selecione o **tipo de chave** (CPF, CNPJ, e-mail, celular ou aleatória).
  3. Digite a **chave** exatamente como está cadastrada no banco, sem espaços extras.
  4. Informe o **nome** (até 25 caracteres) e a **cidade**.
  5. Preencha o **valor fixo** e a **descrição**, se quiser.
  6. Clique em **Gerar QR Code**.
  7. Baixe em **PNG** para WhatsApp e redes sociais, ou em **SVG** para impressão sem perda de qualidade.
  8. Copie o **código Copia e Cola** para usar em mensagens, e-mails e lojas virtuais.

  O código segue o padrão BR Code EMV do Banco Central e funciona em qualquer banco brasileiro que opere PIX.

  > **Atenção**: Confira a chave antes de baixar. Um caractere errado gera um QR Code inválido que redireciona o pagamento para outra pessoa ou retorna erro no app do banco.

  ## PIX estático ou dinâmico: qual usar para o meu negócio?

  **PIX estático** é o que este gerador cria. Um único QR Code válido para múltiplos pagamentos, sem data de vencimento. Você gera uma vez e usa para sempre no balcão, no cardápio, na vitrine ou no link de bio.

  **PIX dinâmico** é gerado por cobrança individual. Cada pagamento tem seu próprio QR Code, com CPF do pagador, data de vencimento e regras de juros e multa configuráveis. Exige integração com a API bancária ou uma plataforma de pagamentos (como Asaas, Efí ou Celcoin) e é indicado para e-commerce com alto volume de recebíveis.

  Para a maioria das lojas físicas, restaurantes e MEIs, o PIX estático resolve tudo. Veja a comparação detalhada em [PIX estático vs. PIX dinâmico](/comparar/pix-estatico-vs-dinamico).

  Rodrigo tem uma barbearia no Tatuapé. Antes de gerar o QR Code, ele colocava uma folha impressa com a chave PIX no balcão. Os clientes precisavam digitar a chave inteira no app, o que gerava erros e filas. Depois que ele colou o QR Code plastificado, o tempo de pagamento caiu para menos de 10 segundos por cliente. Ele gerou o QR Code usando um gerador de PIX grátis, sem pagar nada e sem criar conta em nenhum sistema.

  ## Qual chave PIX usar: CPF, CNPJ ou chave aleatória?

  Se você tem um CNPJ (MEI, ME ou empresa), prefira cadastrar a chave PIX pelo CNPJ. Assim os recebimentos ficam separados das suas finanças pessoais, o que facilita a declaração de faturamento no Imposto de Renda e o controle de caixa.

  O CPF funciona para qualquer pessoa física, mas mistura receita comercial com conta pessoal. Isso complica a vida na hora de declarar o IR e de comprovar faturamento para crédito ou enquadramento no Simples Nacional.

  A **chave aleatória** é a opção mais segura: não expõe CPF nem celular no QR Code. Boa escolha se você compartilha o código publicamente em redes sociais.

  Para o guia completo sobre tipos de chave e limites do PIX para MEI, veja [QR Code PIX para MEI](/blog/qr-code-pix-para-mei-guia-completo).

  ## Onde usar o QR Code gerado

  O QR Code PIX funciona em qualquer lugar onde o cliente consiga apontar a câmera do celular. Os usos mais comuns:

  - **Balcão de loja ou caixa**: imprima em A5 e plastifique para durar meses.
  - **Mesa de restaurante**: inclua no cardápio ou em um porta-cardápio acrílico.
  - **Feirante ou vendedor ambulante**: lamine o QR Code ou use um display de mesa portátil.
  - **WhatsApp Business**: salve o PNG e envie no chat ao fechar um pedido.
  - **Loja virtual ou site**: insira o QR Code na página de pagamento e o Copia e Cola no texto ao lado.
  - **Instagram e redes sociais**: adicione ao destaque "Pagamento" ou inclua nos stories fixados.
  - **Link de bio**: ferramentas como Linktree e Bio.link permitem inserir imagem do QR Code.

  Se você tem um restaurante e ainda usa maquininha para todos os pagamentos, veja também como outros estabelecimentos estão usando o [QR Code para restaurante](/blog/qr-code-para-restaurante) como alternativa sem taxa por transação.

  ## Como compartilhar o QR Code PIX pelo WhatsApp e Instagram

  **Pelo WhatsApp**: baixe o QR Code em PNG e envie como imagem normal na conversa. Para pedidos com valor variável, envie o código Copia e Cola junto com a imagem. O cliente copia o texto, abre o app do banco, vai em "PIX Copia e Cola" e cola. Simples.

  **Pelo Instagram**: salve o PNG no celular e poste nos Stories com um texto explicativo. Você também pode adicionar como imagem no Destaque "Formas de Pagamento". Clientes que estão no computador podem abrir o app do banco pelo celular e escanear a tela.

  **Por e-mail ou mensagem**: cole o código Copia e Cola diretamente no corpo do texto. O cliente não precisa baixar nada, só copiar e colar no app do banco.

  ## Erros comuns ao gerar QR Code PIX e como evitar

  **Chave digitada errada**: o erro mais frequente. Um ponto ou traço a menos invalida o QR Code ou redireciona para outra chave. Solução: copie a chave direto do app do banco, sem redigitar.

  **Nome com mais de 25 caracteres**: o gerador corta automaticamente, mas pode truncar o nome no lugar errado. Use o nome fantasia curto: "Barbearia RB" em vez de "Barbearia Rodrigo Barbosa e Filhos".

  **Cidade incorreta**: o padrão BR Code exige a cidade do recebedor conforme o cadastro bancário. Use a cidade da sua conta, não do seu endereço comercial se forem diferentes.

  **Valor fixo quando deveria ser variável**: se você cobra valores diferentes por pedido, deixe o campo de valor em branco. Com o valor fixo preenchido, o cliente só pode pagar aquele valor exato, a menos que edite manualmente no app do banco.

  **QR Code impresso com resolução baixa**: use sempre o formato SVG para impressão. PNG em baixa resolução fica borrado e o leitor do banco pode não conseguir ler.

  ## Dicas para imprimir o QR Code PIX no balcão

  - **Tamanho mínimo**: 5 x 5 cm para leitura confortável. Abaixo disso, apps de banco mais antigos podem ter dificuldade.
  - **Formato SVG**: vetorial, não perde qualidade em nenhuma resolução. PNG funciona a partir de 300 dpi.
  - **Plastifique**: papel amassado, molhado ou com reflexo de luz dificulta a leitura. Uma plastificação simples na papelaria custa menos de R$ 5 e dura anos.
  - **Inclua o código Copia e Cola impresso**: coloque o texto do Copia e Cola embaixo do QR Code. Clientes com câmera ruim podem digitar manualmente.
  - **Teste antes de imprimir em quantidade**: abra o app do banco e escaneie o QR Code antes de mandar para a gráfica. Confirme que o nome e o valor (se houver) estão corretos.

  Carolina tem uma confeitaria em Belo Horizonte. Ela gerou o QR Code, imprimiu em A5 e plastificou em casa com um kit de plastificação comprado por R$ 40. No primeiro fim de semana, ela recebeu mais de 30 pagamentos via PIX escaneados no QR Code, sem nenhum erro. O custo total foi zero: gerador grátis, plastificação uma vez, duração indefinida.

  ## O QR Code PIX tem prazo de validade?

  O PIX estático **não expira**. Você gera uma vez e usa o mesmo QR Code pelo tempo que quiser. Se mudar de chave PIX ou de banco, gere um novo em minutos. Se incluiu um valor fixo e precisar cobrar um valor diferente, o cliente pode editar o valor no app do banco antes de confirmar o pagamento.

  A única situação em que o QR Code fica inutilizável é se você excluir a chave PIX do banco. Nesse caso, o pagamento não processa e o cliente recebe um erro. Sempre confirme que a chave está ativa antes de colocar o QR Code em circulação.

  ## Os dados ficam seguros?

  Sim. O QR Code PIX contém apenas sua chave PIX, nome e cidade: as mesmas informações que você compartilha ao passar a chave para qualquer pessoa. Não há dados bancários, saldo ou histórico de transações no código.

  O GeraCode processa tudo no seu navegador, sem enviar nenhum dado para servidores externos. Nenhuma informação é armazenada após você fechar a aba. Saiba mais em [nossa política de privacidade](/privacidade).

  ## QR Code PIX para loja virtual e e-commerce

  Se você vende online, o código Copia e Cola é o formato mais prático: o cliente está no celular, copia o texto, abre o banco e cola em "PIX Copia e Cola". Em três passos.

  Para e-commerce com volume alto de pedidos e necessidade de confirmação automática de pagamento, o PIX dinâmico via API é o caminho certo. Veja como funciona em [QR Code PIX sem valor fixo via API](/blog/qr-code-pix-sem-valor-fixo-api).

  Para começar agora, use o [gerador de QR Code PIX grátis do GeraCode](/gerador-de-qr-code-pix). Sem cadastro, sem instalação, sem limite de geração.
