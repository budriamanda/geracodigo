bodyMarkdown: |
  Criar um QR Code gratuito é mais simples do que parece — e não exige conta em nenhum serviço. Um gerador online resolve em menos de 1 minuto. Mas atenção: muitas ferramentas gratuitas têm limitações importantes que pouca gente percebe antes de usar. Este guia explica tudo.

  ## QR Code estático vs. dinâmico: a diferença que ninguém conta

  Antes de escolher um gerador, entenda essa diferença:

  - **QR Code estático**: o conteúdo está embutido na imagem. Você gera uma vez, baixa e usa para sempre — sem conta, sem assinatura, sem validade. Se você imprimir em mil panfletos, vai funcionar daqui a 10 anos.
  - **QR Code dinâmico**: a imagem aponta para um servidor; você pode trocar o destino sem mudar o código impresso. Mas exige conta ativa em uma plataforma — se você cancelar, o QR Code para de funcionar.

  Ferramentas como Adobe Express, Canva e QR Code Generator cobram pelo QR Code dinâmico ou exigem conta paga para manter o redirecionamento ativo. **O GeraCode gera QR Code estático gratuito**, sem dependência de servidor, sem risco de expiração.

  Para a maioria dos casos — balcão, cardápio, cartão de visita, panfleto — o estático é tudo que você precisa.

  ## O que você pode colocar em um QR Code

  - **Link (URL)**: direciona para site, produto, formulário, cardápio digital ou perfil de rede social.
  - **Texto simples**: exibe uma mensagem, endereço ou instrução.
  - **Wi-Fi**: conecta automaticamente à rede sem digitar a senha.
  - **PIX**: gera uma cobrança com sua chave (use o [gerador específico de QR Code PIX](/gerador-de-qr-code-pix) — ele segue o padrão BR Code do Banco Central).
  - **Contato (vCard)**: salva um contato direto na agenda do celular.
  - **E-mail ou SMS**: abre o app já com destinatário e texto preenchidos.

  ## Passo a passo: gerando seu QR Code

  ### 1. Acesse o gerador

  Abra o [gerador de QR Code do GeraCode](/gerador-de-qr-code) no navegador. Funciona em computador e celular, sem instalar nada e sem criar conta.

  ### 2. Digite o conteúdo

  Cole o link ou escreva o texto que você quer codificar.

  > Para links: inclua sempre o `https://` no começo — sem ele, alguns leitores mostram o texto em vez de abrir o navegador.

  ### 3. Ajuste as configurações (opcional)

  - **Tamanho**: aumente para impressão em formatos maiores (A5, A4).
  - **Margem**: mantenha a margem padrão — ela é necessária para que leitores consigam detectar o código.
  - **Cores**: troque o preto por uma cor da sua marca e o branco por outra, desde que o contraste seja alto.

  ### 4. Baixe o arquivo

  - **PNG**: ideal para telas (site, e-mail, WhatsApp, redes sociais).
  - **SVG**: ideal para impressão — não perde qualidade em nenhum tamanho.

  Para impressão, **sempre prefira SVG**.

  ## Qual tamanho usar?

  | Uso | Tamanho mínimo |
  |---|---|
  | Tela de celular | 200 × 200 px |
  | Cartão de visita | 2 × 2 cm |
  | Folheto / flyer | 3 × 3 cm |
  | Balcão / mesa | 5 × 5 cm |
  | Banner / vitrine | 10 × 10 cm ou mais |

  Quanto maior a distância de leitura, maior precisa ser o QR Code.

  ## Posso colocar uma logo no centro?

  Sim. O QR Code tem correção de erro embutida (nível H) que permite cobrir até 30% da área sem prejudicar a leitura. Logotipos pequenos no centro funcionam bem.

  Depois de adicionar a logo, teste com pelo menos dois apps diferentes (Android e iPhone) antes de imprimir em escala.

  ## O QR Code gerado tem marca d'água?

  Não. O GeraCode gera QR Codes limpos, sem marca d'água, sem limite de uso e sem data de expiração. O arquivo que você baixa é seu — não depende de nenhum servidor para funcionar.

  ## Preciso de conta ou cadastro?

  Não. O gerador funciona 100% sem cadastro. Acessa, cria, baixa e pronto.

  ## Preciso de internet para o QR Code funcionar?

  Depende do conteúdo:

  - **Texto, Wi-Fi, contato**: não precisam de internet — o conteúdo está dentro do código.
  - **Links (URLs)**: precisam de internet para abrir o site, mas o código em si é lido offline.

  ## Dicas para QR Codes que sempre funcionam

  **Teste antes de imprimir.** Escaneie com Android e iPhone antes de mandar para a gráfica.

  **Mantenha contraste alto.** Tons pastéis podem funcionar na tela mas falhar na impressão — fundo claro e código escuro é o mais seguro.

  **Não distorça.** Se precisar encaixar em um espaço não quadrado, adicione margem em branco — nunca estique o QR Code em formato retangular.

  **Superfícies fosca, não brilhante.** Acrílico e plástico brilhante criam reflexo que atrapalha a câmera. Prefira papel fosco ou laminação fosca.

  **Para PIX**, use sempre o [gerador específico de QR Code PIX](/gerador-de-qr-code-pix) — ele gera o código no padrão BR Code exigido pelo Banco Central e inclui o código Copia e Cola junto. Veja o guia completo em [como criar QR Code PIX grátis](/blog/gerador-pix-gratis-como-criar-qr-code-pix).

  ## QR Code de contato (vCard): como formatar corretamente

  O formato vCard codificado em QR Code é suportado nativamente por iOS e Android — ao escanear, o celular oferece salvar o contato diretamente na agenda. O formato básico:

  ```
  BEGIN:VCARD
  VERSION:3.0
  FN:João Silva
  ORG:Empresa Ltda
  TEL:+5511999887766
  EMAIL:joao@empresa.com.br
  URL:https://empresa.com.br
  END:VCARD
  ```

  Pontos importantes:
  - Use `VERSION:3.0` — mais compatível que a versão 4.0 com Android antigo
  - O telefone deve estar no formato internacional: `+55` + DDD + número
  - Cole o bloco vCard completo (sem modificações) no campo de texto do [gerador de QR Code](/gerador-de-qr-code)
  - Para múltiplos telefones, repita a linha `TEL:` com tipo: `TEL;TYPE=WORK:` e `TEL;TYPE=CELL:`

  O QR Code de vCard é estático — se o telefone mudar, você precisará gerar e reimprimir um novo código.

  ## QR Code para redes sociais: Instagram, YouTube, LinkedIn

  QR Codes que apontam para perfis sociais são muito usados em cartões de visita, banners e embalagens. Basta gerar um QR Code com o link do perfil:

  | Rede social | Link a usar no QR Code |
  |---|---|
  | Instagram | `https://instagram.com/seuperfil` |
  | YouTube | `https://youtube.com/@seucanal` |
  | LinkedIn | `https://linkedin.com/in/seuperfil` |
  | TikTok | `https://tiktok.com/@seuperfil` |
  | WhatsApp | `https://wa.me/5511999887766` |

  **Dica:** use links curtos (como `bit.ly` ou `go.link`) quando o perfil tem URL longa ou você quer rastrear cliques. Links mais curtos geram QR Codes com menos módulos, facilitando a leitura em tamanhos pequenos.

  ## Como rastrear quem escaneou seu QR Code (analytics)

  QR Codes estáticos não têm analytics nativo — você não sabe quantas pessoas escanearam. Mas com UTM parameters, você rastreia no Google Analytics:

  Em vez de apontar para `https://seusite.com/pagina`, use:
  ```
  https://seusite.com/pagina?utm_source=qrcode&utm_medium=impresso&utm_campaign=panfleto-maio
  ```

  O Google Analytics vai registrar as visitas com essa fonte. Você vê quantas pessoas escanearam o QR Code em cada material impresso.

  Outra opção: use um encurtador com analytics (bit.ly ou Dub.co) como destino do QR Code. O encurtador rastreia os cliques e o QR Code continua funcionando se você trocar o destino posteriormente.

  ## QR Code por tipo de negócio: o que usar em cada caso

  Diferentes negócios têm usos diferentes para QR Codes. Um guia rápido:

  | Tipo de negócio | QR Code recomendado | Conteúdo |
  |---|---|---|
  | Restaurante / lanchonete | Link + Pix | Cardápio digital + pagamento Pix |
  | Loja de roupas | Link + vCard | Catálogo online + contato WhatsApp |
  | Salão de beleza | Link | Agendamento online (Trinks, Booksy) |
  | E-commerce | Link | Página do produto ou rastreamento |
  | Profissional liberal | vCard + Link | Contato + site profissional |
  | Hotel / pousada | Wi-Fi + Link | Senha do Wi-Fi + serviços do hotel |
  | Academia | Link | Tabela de treinos, avaliação física |
  | Consultório médico | Link | Formulário de anamnese ou telemedicina |

  Para restaurantes, veja o guia completo: [QR Code para restaurante](/blog/qr-code-para-restaurante).

  ## Checklist antes de imprimir em quantidade

  Antes de mandar 500 panfletos para a gráfica:

  - [ ] Digitou o link com `https://` no começo?
  - [ ] Testou o QR Code com Android (câmera nativa)?
  - [ ] Testou com iPhone?
  - [ ] O link de destino está funcionando?
  - [ ] O QR Code tem pelo menos 3 × 3 cm no arquivo de impressão?
  - [ ] O contraste está alto (código escuro em fundo claro)?
  - [ ] Baixou em SVG (não PNG)?
  - [ ] Se tiver logo no centro, o nível de correção está em H?

  Um QR Code que não funciona no panfleto impresso é desperdício de dinheiro e oportunidade. Cinco minutos de teste evitam isso.

  ## Próximos passos

  - Quer entender como o QR Code funciona por dentro? Leia [como funciona o QR Code](/blog/qr-code-como-funciona-guia-completo).
  - Precisa ler um QR Code pelo computador? Veja [como escanear QR Code pelo computador](/blog/como-escanear-qr-code-pelo-computador).
