        icone: ""
      - titulo: "Catálogos impressos"
        descricao: "Cada produto no catálogo pode ter seu próprio QR Code direcionando para a página de compra no site ou marketplace. Transforma material impresso em funil digital."
        icone: ""
      - titulo: "Materiais de PDV"
        descricao: "Adesivos no balcão e totens podem levar clientes ao programa de fidelidade, avaliações no Google ou promoções do momento. Use urgência (\"escaneie e ganhe\") para aumentar conversão."
        icone: ""
      - titulo: "Anúncios em mídia impressa"
        descricao: "Revistas, outdoors e flyers ganham interatividade com QR Codes. Use URLs com UTM para rastrear conversões por campanha no Google Analytics."
        icone: ""
      - titulo: "Eventos e feiras"
        descricao: "QR Code no crachá, stand ou material distribuído leva participantes direto para a página do evento, captação de leads ou download de material rico."
        icone: ""
    tags: []
    links: []
  - tipo: prose
    titulo: "Erros Comuns em QR Code e Como Evitar"
    subtitulo: ""
    conteudo: "- **QR Code em movimento:** colocar QR Code em ônibus, caminhão ou faixa balançando no vento dificulta a leitura pelo smartphone. Prefira posições estáticas.\n- **Contraste invertido:** QR Code claro sobre fundo escuro funciona em alguns leitores, mas falha em outros. Prefira sempre escuro sobre claro.\n- **Cores muito próximas:** QR Codes em degradê ou com cores similares entre módulos e fundo perdem legibilidade. Mantenha contraste mínimo de 4:1.\n- **Logo no centro grande demais:** QR Codes com logotipo funcionam se o logo ocupa até 25% da área central e houver correção de erro alta (nível H). Acima disso, o código quebra.\n- **URLs muito longas:** quanto mais dados, mais módulos; o QR fica denso e difícil de ler em tamanhos pequenos. Use encurtadores (com redirecionamento confiável).\n- **Não testar antes de imprimir em escala:** sempre escaneie com iPhone e Android diferentes antes de mandar 10 mil flyers para gráfica. Um código quebrado pode inutilizar a tiragem inteira.\n- **QR apontando para página desativada:** se você imprimiu materiais duradouros (adesivos de veículo, placas, embalagens), use URL permanente em domínio próprio. Evite links de campanha que podem expirar."
    stepColor: "indigo"
