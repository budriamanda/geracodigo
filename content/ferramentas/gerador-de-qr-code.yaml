  - tipo: prose
    titulo: "Boas Práticas para QR Codes"
    subtitulo: ""
    conteudo: "- **Mantenha o contraste:** QR Codes precisam de bom contraste entre os módulos (quadradinhos) e o fundo. Cor escura sobre fundo claro é o mais seguro.\n- **Tamanho mínimo para impressão:** Pelo menos 2 x 2 cm para leitura confiável em smartphones. Para distâncias maiores (cartazes, banners), aumente proporcionalmente.\n- **Teste antes de imprimir:** Sempre escaneie o QR Code com pelo menos 2 aplicativos diferentes para garantir que funciona corretamente.\n- **URLs curtas:** Links mais curtos geram QR Codes com menos módulos, que são mais fáceis de escanear. Use encurtadores de URL quando necessário.\n- **Use SVG para impressão profissional:** O formato SVG é vetorial e não perde qualidade ao ampliar, ideal para adesivos, cartões de visita e materiais gráficos."
    stepColor: "indigo"
    bgCard: true
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: prose
    titulo: "QR Code Estático vs Dinâmico: qual usar?"
    subtitulo: ""
    conteudo: "Essa é a dúvida mais comum; e a resposta determina o custo, a flexibilidade e o que você pode rastrear.\n\n**QR Code estático** (o que o GeraCode gera):\n- O conteúdo é gravado diretamente no código no momento da geração\n- Não pode ser alterado depois; se você imprimir 1.000 flyers e o link mudar, precisa reimprimir tudo\n- Não tem analytics nativo; você não sabe quantas pessoas escanearam\n- **Gratuito, para sempre**, funciona sem conta, sem servidor\n- Ideal para: cartões de visita, embalagens, placas com Wi-Fi, pagamento Pix, materiais duráveis com URL permanente\n\n**QR Code dinâmico**:\n- Aponta para um link curto intermediário que você pode redirecionar sem reimprimir o código\n- Permite analytics: quantos scans, quando, de qual cidade e dispositivo\n- Requer conta em um serviço pago (a partir de ~R$ 30/mês)\n- Ideal para: campanhas de marketing com prazo, materiais com trocas frequentes de destino, gestão de múltiplos QR Codes\n\n**Regra prática:** se você vai imprimir em material descartável (flyers, cartazes de promoção), use dinâmico. Se vai imprimir em material permanente (embalagem de produto, placa de negócio, cartão de visita), use estático; e garanta que a URL seja duradoura."
    stepColor: "indigo"
    bgCard: true
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: prose
    titulo: "QR Code vs Código de Barras: Qual Escolher?"
    subtitulo: ""
    conteudo: "O **código de barras tradicional** (como EAN-13) armazena apenas dados numéricos de forma linear, sendo ideal para identificação de produtos no ponto de venda. Já o **QR Code** é bidimensional e armazena muito mais informação: links, textos, contatos, Wi-Fi e mais.\n\nUse **código de barras** para: etiquetas de produtos, controle de estoque, sistemas de PDV e logística. Use **QR Code** para: marketing digital, pagamentos Pix, cardápios, compartilhamento de informações e engajamento do cliente.\n\nO GeraCode oferece ambas as ferramentas gratuitamente. Acesse o [Gerador de Código de Barras](/gerador-de-codigo-de-barras) para criar códigos EAN-13, Code 128 e mais."
    stepColor: "indigo"
    bgCard: false
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: cards
    titulo: "QR Code em Campanhas de Marketing"
    subtitulo: ""
