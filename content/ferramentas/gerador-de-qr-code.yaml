faqFallbacks:
  - pergunta: "O QR Code gerado tem prazo de validade?"
    resposta: "O QR Code estático gerado aqui não tem prazo de validade; ele funciona indefinidamente enquanto a informação codificada (URL, texto, etc.) continuar válida. Se você codificou uma URL que depois mudou ou foi removida, o QR Code abre mas o link fica quebrado. Para QR Codes que você precisa alterar o destino sem reimprimir, use um serviço de QR Code dinâmico (geralmente pago)."
  - pergunta: "Qual a diferença entre QR Code estático e dinâmico?"
    resposta: "QR Code estático (gerado aqui): o conteúdo é gravado diretamente no código, não pode ser alterado depois, é gratuito e funciona para sempre sem conta. QR Code dinâmico: aponta para um link intermediário que você pode redirecionar; permite analytics (quantos scans, quando, de onde) e mudança de destino sem reimprimir. O dinâmico exige conta em serviço pago (a partir de ~R$ 30/mês)."
  - pergunta: "Como criar QR Code para Instagram?"
    resposta: "Copie o link do seu perfil do Instagram (ex: https://instagram.com/seuperfil), cole no campo de conteúdo do gerador e clique em gerar. O QR Code vai direcionar quem escanear direto para o seu perfil. Ideal para colocar em embalagens, cartões de visita, cardápios e qualquer material impresso como link na bio físico."
  - pergunta: "Como criar QR Code para Wi-Fi?"
    resposta: "Digite o texto com o formato padrão: WIFI:T:WPA;S:NomeDaRede;P:SenhaAqui;;, substituindo NomeDaRede e SenhaAqui pelos dados reais. Use T:WEP para redes mais antigas ou T:nopass para redes abertas. Ao escanear, o celular oferece conectar automaticamente sem o cliente precisar digitar a senha."
  - pergunta: "Qual tamanho mínimo para imprimir um QR Code?"
    resposta: "Para uso em papel (cartão de visita, flyer), o mínimo é 2 × 2 cm. Para cartazes e vitrines (leitura a 1-3 m), use 8 × 8 cm a 15 × 15 cm. Regra prática: altura do QR ≥ distância de leitura ÷ 10. Prefira SVG (vetorial, escala infinita) ou PNG com 300 DPI para impressão."
  - pergunta: "Meus dados ficam armazenados em algum servidor?"
    resposta: "Não. Todo o processamento acontece no seu navegador. Nenhuma URL, texto ou conteúdo é enviado para servidores externos. O QR Code é gerado localmente e o arquivo baixado diretamente para o seu dispositivo."
