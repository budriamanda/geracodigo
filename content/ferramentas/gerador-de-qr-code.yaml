  - tipo: prose
    titulo: "Boas Práticas para QR Codes"
    subtitulo: ""
    conteudo: "- **Mantenha o contraste:** QR Codes precisam de bom contraste entre os módulos (quadradinhos) e o fundo. Cor escura sobre fundo claro é o mais seguro.\n- **Tamanho mínimo para impressão:** Pelo menos 2 x 2 cm para leitura confiável em smartphones. Para distâncias maiores (cartazes, banners), aumente proporcionalmente.\n- **Teste antes de imprimir:** Sempre escaneie o QR Code com pelo menos 2 aplicativos diferentes para garantir que funciona corretamente.\n- **URLs curtas:** Links mais curtos geram QR Codes com menos módulos, que são mais fáceis de escanear. Use encurtadores de URL quando necessário.\n- **Use SVG para impressão profissional:** O formato SVG é vetorial e não perde qualidade ao ampliar, ideal para adesivos, cartões de visita e materiais gráficos."
    stepColor: "indigo"
    bgCard: true
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: prose
    titulo: "QR Code vs Código de Barras: Qual Escolher?"
    subtitulo: ""
    conteudo: "O **código de barras tradicional** (como EAN-13) armazena apenas dados numéricos de forma linear, sendo ideal para identificação de produtos no ponto de venda. Já o **QR Code** é bidimensional e armazena muito mais informação: links, textos, contatos, Wi-Fi e mais.\n\nUse **código de barras** para: etiquetas de produtos, controle de estoque, sistemas de PDV e logística. Use **QR Code** para: marketing digital, pagamentos Pix, cardápios, compartilhamento de informações e engajamento do cliente.\n\nO GeraCode oferece ambas as ferramentas gratuitamente. Acesse o [Gerador de Código de Barras](/gerador-de-codigo-de-barras) para criar códigos EAN-13, Code 128 e mais."
    stepColor: "indigo"
    bgCard: false
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: cards
    titulo: "QR Code em Campanhas de Marketing"
    subtitulo: ""
    conteudo: ""
    stepColor: "indigo"
    bgCard: false
    columns: "2"
    items:
      - titulo: "Embalagens de produto"
        descricao: "Adicione QR Code na parte traseira da embalagem apontando para manual em vídeo, receitas ou página de registro de garantia. Reduz a quantidade de texto impresso e aproxima o cliente da marca após a compra."
        icone: ""
      - titulo: "Cartões de visita"
        descricao: "Em vez de listar e-mail, telefone e LinkedIn separadamente, um QR Code pode codificar um vCard completo que o cliente salva direto no celular. Também pode apontar para seu portfólio ou calendário de agendamento."
        icone: ""
      - titulo: "Catálogos impressos"
        descricao: "Cada produto no catálogo pode ter seu próprio QR Code direcionando para a página de compra no site ou marketplace. Transforma material impresso em funil digital."
        icone: ""
      - titulo: "Materiais de PDV"
        descricao: "Adesivos no balcão e totens podem levar clientes ao programa de fidelidade, avaliações no Google ou promoções do momento. Use urgência (\"escaneie e ganhe\") para aumentar conversão."
        icone: ""
      - titulo: "Anúncios em mídia impressa"
        descricao: "Revistas, outdoors e flyers ganham interatividade com QR Codes. Use URLs com UTM para rastrear conversões por campanha no Google Analytics."
        icone: ""
      - titulo: "Eventos e feiras"
        descricao: "QR Code no crachá, stand ou material distribuído leva participantes direto para a página do evento, captação de leads ou download de material rico."
        icone: ""
    tags: []
    links: []
  - tipo: prose
    titulo: "Erros Comuns em QR Code e Como Evitar"
    subtitulo: ""
    conteudo: "- **QR Code em movimento:** colocar QR Code em ônibus, caminhão ou faixa balançando no vento dificulta a leitura pelo smartphone. Prefira posições estáticas.\n- **Contraste invertido:** QR Code claro sobre fundo escuro funciona em alguns leitores, mas falha em outros. Prefira sempre escuro sobre claro.\n- **Cores muito próximas:** QR Codes em degradê ou com cores similares entre módulos e fundo perdem legibilidade. Mantenha contraste mínimo de 4:1.\n- **Logo no centro grande demais:** QR Codes com logotipo funcionam se o logo ocupa até 25% da área central e houver correção de erro alta (nível H). Acima disso, o código quebra.\n- **URLs muito longas:** quanto mais dados, mais módulos — o QR fica denso e difícil de ler em tamanhos pequenos. Use encurtadores (com redirecionamento confiável).\n- **Não testar antes de imprimir em escala:** sempre escaneie com iPhone e Android diferentes antes de mandar 10 mil flyers para gráfica. Um código quebrado pode inutilizar a tiragem inteira.\n- **QR apontando para página desativada:** se você imprimiu materiais duradouros (adesivos de veículo, placas, embalagens), use URL permanente em domínio próprio. Evite links de campanha que podem expirar."
    stepColor: "indigo"
