  - tipo: prose
    titulo: "Como imprimir etiquetas em casa ou no escritório"
    subtitulo: ""
    conteudo: "Qualquer impressora jato de tinta ou laser imprime as etiquetas geradas aqui. Para etiquetas profissionais sem corte manual, use **papel adesivo A4** — disponível em papelarias por R$ 2 a R$ 5 por folha.\n\n**Opções de papel para impressão:**\n\n- **Papel adesivo A4 brilhante**: aparência mais profissional, boa para etiquetas de preço e produtos que ficam em prateleira\n- **Papel adesivo A4 fosco**: melhor para leitura de QR Code (evita reflexo da câmera ao escanear)\n- **Etiqueta Pimaco ou similar**: se tiver impressora de etiqueta (Zebra, Argox, Elgin), baixe em PNG e importe no software da impressora\n\n**Dica de corte**: imprima o PDF, que já vem com múltiplas cópias alinhadas na folha. Use guilhotina ou tesoura. Para volume maior, gráficas rápidas (como Fast Color e similares) imprimem e cortam folhas de etiqueta por R$ 1 a R$ 3 por folha."
    stepColor: "emerald"
