faqFallbacks:
  - pergunta: "Como imprimir a etiqueta gerada?"
    resposta: "Baixe em PDF e imprima em papel adesivo A4 comum (disponível em papelarias por R$ 2 a R$ 5 por folha). O PDF coloca múltiplas cópias alinhadas para economizar papel. Para impressão em PNG, abra no celular ou no computador e imprima ajustando o tamanho manualmente."
  - pergunta: "Qual tamanho de etiqueta escolher?"
    resposta: "Para produtos pequenos (bijuteria, cosmético, alimento embalado): 50×30mm. Para roupas e calçados: 70×40mm. Para produtos maiores com mais informações: 100×50mm ou 100×70mm. O preview atualiza em tempo real para você ver antes de baixar."
  - pergunta: "Posso usar qualquer número EAN-13 na etiqueta?"
    resposta: "Sim. Se você já tem o EAN-13 do produto (impresso na embalagem original ou gerado no GeraCode), basta digitar os 12 ou 13 dígitos. O gerador valida o dígito verificador automaticamente. Se o código for inválido, uma mensagem de erro aparece antes de gerar a etiqueta."
  - pergunta: "A etiqueta tem qualidade suficiente para impressão profissional?"
    resposta: "Sim. As etiquetas são geradas em alta resolução (8px/mm, equivalente a 200 DPI). Para uso em prateleira e balcão, a qualidade é adequada com qualquer impressora jato de tinta ou laser. Para gráficas e impressoras industriais de etiqueta, baixe o PNG e importe no software da impressora."
  - pergunta: "Funciona no celular?"
    resposta: "Sim. O gerador funciona no celular e no computador, em qualquer navegador moderno. O download de PDF e PNG funciona normalmente no Android (Chrome) e no iPhone (Chrome ou Safari)."
  - pergunta: "Posso adicionar logo ou imagem à etiqueta?"
    resposta: "Por enquanto, o gerador não suporta upload de logo. Você pode adicionar um QR Code com o link da sua loja ou rede social como elemento de identidade visual na etiqueta."
