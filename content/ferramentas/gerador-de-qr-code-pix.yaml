  - tipo: cards
    titulo: "QR Code Pix por Tipo de Negócio"
    subtitulo: ""
    conteudo: ""
    stepColor: "indigo"
    bgCard: false
    columns: "2"
    items:
      - titulo: "Comércio de rua e feiras"
        descricao: "Gere um QR Code estático sem valor fixo, imprima em SVG (3–5 cm) e plastifique. O cliente digita o valor na hora. Ideal para barracas, feiras livres, food trucks e ambulantes legalizados como MEI."
        icone: ""
      - titulo: "Restaurantes e lanchonetes"
        descricao: "Coloque o QR Pix com CNPJ da empresa no balcão e nas mesas. Para evitar confusão com o QR do cardápio digital, use um rótulo claro como \"Pagar via Pix\". Para cobranças com confirmação automática, considere migrar para Pix dinâmico via API do banco."
        icone: ""
      - titulo: "Prestadores de serviço (autônomos)"
        descricao: "Profissionais como manicures, cabeleireiros, professores particulares e técnicos podem gerar o QR Pix com CPF ou chave aleatória, imprimir em cartão de visita e apresentar ao cliente ao finalizar o atendimento."
        icone: ""
      - titulo: "E-commerce simples"
        descricao: "Para lojas virtuais sem integração com gateway, exiba o QR Pix estático na tela de checkout e solicite o envio do comprovante por e-mail ou WhatsApp. Funciona, mas exige conciliação manual — prefira a API Pix para volumes maiores."
        icone: ""
      - titulo: "Doações e ONGs"
        descricao: "Organizações sociais podem gerar um QR Pix institucional (CNPJ) sem valor fixo para receber doações de qualquer valor. Divulgue em redes sociais, sites e materiais impressos. O payload é válido para campanhas nacionais."
        icone: ""
      - titulo: "Cobranças recorrentes informais"
        descricao: "Aluguéis, mensalidades de cursos ou serviços fixos podem ter o mesmo QR Pix reutilizado mensalmente. O payload estático é válido por tempo indeterminado, mas atualize o QR sempre que houver troca de chave Pix no banco."
        icone: ""
    tags: []
