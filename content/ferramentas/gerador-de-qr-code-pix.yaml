    subtitulo: ""
    conteudo: ""
    stepColor: "indigo"
    bgCard: false
    columns: "2"
    items:
      - titulo: "Pix Estático (gerado aqui)"
        descricao: "QR Code fixo, reutilizável indefinidamente. Valor opcional (fixo ou o pagador digita). Não há confirmação automática — é preciso conferir no extrato. Ideal para: comércio de rua, doações, cobranças simples, baixo volume. Custo: zero."
        icone: ""
      - titulo: "Pix Dinâmico (API do banco)"
        descricao: "QR gerado sob demanda para cada cobrança. Valor sempre pré-definido pelo emissor. Webhook de confirmação automática em segundos. Ideal para: e-commerce, assinaturas, SaaS, alto volume. Custo: varia por banco (alguns cobram por transação)."
        icone: ""
