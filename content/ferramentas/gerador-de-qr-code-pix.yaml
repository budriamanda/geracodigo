  - tipo: prose
    titulo: "O que é o QR Code Pix?"
    subtitulo: ""
    conteudo: "O **QR Code Pix** é uma forma de receber pagamentos instantâneos pelo [sistema Pix do Banco Central do Brasil](https://www.bcb.gov.br/estabilidadefinanceira/pix). Ao escanear o QR Code com qualquer aplicativo bancário, o pagador é direcionado automaticamente para a tela de pagamento com os dados do recebedor preenchidos.\n\nO payload gerado segue o padrão **BR Code EMV**, [especificação oficial do Banco Central](https://www.bcb.gov.br/estabilidadefinanceira/pagamentosinstantaneos), compatível com todos os bancos e fintechs participantes do Pix no Brasil, incluindo Nubank, Itaú, Bradesco, Caixa, Banco do Brasil, Inter, PagSeguro, Mercado Pago e outros.\n\nO GeraCode gera **QR Codes estáticos**, ideais para cobranças com valor fixo ou aberto (o pagador digita o valor). Para cobranças dinâmicas com confirmação automática e geração de comprovante, é necessário utilizar a API Pix do seu banco."
    stepColor: "indigo"
    bgCard: true
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: cards
    titulo: "Tipos de Chave Pix Suportados"
    subtitulo: ""
    conteudo: ""
    stepColor: "indigo"
    bgCard: true
    columns: "2"
    items:
      - titulo: "CPF"
        descricao: "Chave vinculada ao CPF do recebedor. Formato: 11 dígitos numéricos (ex: 12345678901). Ideal para pessoas físicas e autônomos."
        icone: ""
      - titulo: "CNPJ"
        descricao: "Chave vinculada ao CNPJ da empresa. Formato: 14 dígitos numéricos (ex: 12345678000190). Indicada para empresas e MEIs."
        icone: ""
      - titulo: "E-mail"
        descricao: "Endereço de e-mail cadastrado como chave Pix no banco. Aceita qualquer formato de e-mail válido. Prático para profissionais liberais."
        icone: ""
      - titulo: "Telefone"
        descricao: "Número de celular com código do país (+55) e DDD. Formato: +5511999999999. Conveniente para pequenos comerciantes e prestadores de serviço."
        icone: ""
      - titulo: "Chave Aleatória (UUID)"
        descricao: "Código alfanumérico gerado pelo banco (formato UUID). Ideal quando você não quer expor dados pessoais como CPF ou telefone ao receber pagamentos."
        icone: ""
