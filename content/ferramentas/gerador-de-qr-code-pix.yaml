  - tipo: prose
    titulo: "Dicas para Usar seu QR Code Pix"
    subtitulo: ""
    conteudo: "- **Imprima em tamanho adequado:** Para leitura confiável, imprima o QR Code com pelo menos 3 × 3 cm. Em balcões e totens, prefira 5 × 5 cm ou maior.\n- **Use SVG para impressão:** O formato SVG mantém a qualidade em qualquer tamanho, sem pixels ou borrosidade. Ideal para adesivos, placas e materiais gráficos.\n- **Teste antes de usar:** Sempre escaneie o QR Code com seu próprio aplicativo bancário para confirmar que os dados estão corretos antes de disponibilizar para clientes.\n- **Valor fixo vs. aberto:** Se você vende produtos com preço fixo, defina o valor no gerador. Para doações ou serviços variados, deixe o campo de valor em branco para que o pagador digite."
    stepColor: "indigo"
