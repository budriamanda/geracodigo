  - tipo: prose
    titulo: "Erros Comuns ao Gerar QR Code Pix"
    subtitulo: ""
    conteudo: "- **Chave Pix não cadastrada no banco:** o QR é gerado corretamente, mas a tentativa de pagamento falha com \"chave não encontrada\". Confira no app do seu banco se a chave está ativa antes de imprimir o QR.\n- **CPF ou CNPJ com pontuação:** o padrão BR Code aceita apenas dígitos (sem pontos, barras ou traços). Nosso gerador remove automaticamente, mas se você copiar o payload manualmente, garanta que esteja limpo.\n- **Nome do recebedor com mais de 25 caracteres:** a especificação do Banco Central limita o campo do nome. Abrevie (ex: \"Restaurante Bom Gosto\" → \"Rest Bom Gosto\"). Nossa ferramenta sinaliza quando o limite é ultrapassado.\n- **Cidade com acento ou caracteres especiais:** prefira cidade sem acento (\"Sao Paulo\" em vez de \"São Paulo\") por compatibilidade ampla entre bancos. A maioria aceita acento, mas alguns leitores antigos podem falhar.\n- **QR impresso muito pequeno ou borrado:** para impressão térmica (cupom), use no mínimo 3 × 3 cm. Em papel sulfite, 4 × 4 cm. Prefira SVG sobre PNG para manter a nitidez.\n- **QR parece válido mas nenhum banco lê:** revise se o CRC16 está correto — erros manuais no payload invalidam todo o código. Nossa ferramenta recalcula o CRC automaticamente a cada alteração."
    stepColor: "indigo"
    bgCard: true
