faqFallbacks:
  - pergunta: "O QR Code Pix gerado aqui é válido?"
    resposta: "Sim. O payload segue o padrão BR Code EMV definido pelo Banco Central do Brasil. O QR Code é testado com o algoritmo CRC16 e funciona em todos os bancos participantes do Pix."
  - pergunta: "Meus dados ficam salvos em algum servidor?"
    resposta: "Não. Todo o processamento acontece no seu navegador (client-side). Nenhum dado (chave Pix, nome, valor) é enviado para servidores externos."
  - pergunta: "Qual é a diferença entre QR Code estático e dinâmico?"
    resposta: "O QR Code estático, gerado aqui, é fixo e pode ser usado múltiplas vezes. O QR Code dinâmico é gerado pela API do banco para cada cobrança, com controle de pagamento e notificação automática."
  - pergunta: "Posso usar este QR Code no meu e-commerce?"
    resposta: "Sim, para cobranças simples. Basta inserir o QR Code como imagem no seu site ou imprimir para uso físico. Para integração automática com confirmação de pedido, use a API Pix do seu banco."
  - pergunta: "O gerador funciona para Pix com CPF, CNPJ, e-mail e telefone?"
    resposta: "Sim, todos os tipos de chave Pix são suportados: CPF, CNPJ, e-mail, telefone (com +55) e chave aleatória (UUID)."
