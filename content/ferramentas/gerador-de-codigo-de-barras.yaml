    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: prose
    titulo: "Código de Barras e GS1 Brasil"
    subtitulo: ""
    conteudo: "Para comercializar produtos em **grandes redes varejistas** (supermercados, farmácias, magazines), os códigos EAN devem ser registrados na [**GS1 Brasil**](https://www.gs1br.org/), a entidade oficial responsável pela atribuição de prefixos de fabricante.\n\nPara diversas situações o GeraCode é a ferramenta ideal, dispensando registro na GS1:\n\n- **E-commerce próprio:** Lojas virtuais com sistemas próprios de controle de estoque.\n- **Controle interno:** Identificação de ativos, ferramentas, equipamentos e materiais.\n- **Testes e protótipos:** Validação de layouts de embalagens e etiquetas.\n- **Logística interna:** Rastreamento de volumes e caixas com Code 128 ou ITF-14.\n- **Uso educacional:** Demonstrações, treinamentos e materiais didáticos."
    stepColor: "indigo"
    bgCard: false
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: prose
    titulo: "Dicas para Impressão de Códigos de Barras"
    subtitulo: ""
    conteudo: "- **Tamanho mínimo:** O tamanho mínimo recomendado para EAN-13 é 25,93 x 21,31 mm. Códigos muito pequenos podem não ser lidos por scanners.\n- **Contraste:** Use barras escuras sobre fundo claro. Preto sobre branco oferece o melhor contraste.\n- **Zonas de silêncio:** Mantenha uma área em branco de pelo menos 5mm antes e depois do código.\n- **Resolução:** Para impressão profissional, use SVG (vetorial) ou PNG com pelo menos 300 DPI.\n- **Teste de leitura:** Sempre teste o código impresso com um leitor antes de produzir em escala.\n- **Etiquetas:** Use a função de impressão de etiquetas do GeraCode para layouts prontos em A4."
    stepColor: "indigo"
    bgCard: true
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: cards
    titulo: "Aplicações por Setor"
    subtitulo: ""
    conteudo: ""
    stepColor: "indigo"
    bgCard: false
    columns: "2"
    items:
      - titulo: "Varejo e supermercados"
        descricao: "EAN-13 no produto final; ITF-14 nas caixas de transporte; Code 128 em etiquetas de gôndola e preços. O leitor do PDV identifica automaticamente o formato."
        icone: ""
      - titulo: "Logística e transporte"
        descricao: "Code 128 para números de rastreio (18 a 24 dígitos alfanuméricos). Correios usa variações do Code 128 e ITF. Transportadoras privadas (Jadlog, Total Express) seguem o mesmo padrão."
        icone: ""
      - titulo: "Indústria farmacêutica"
        descricao: "EAN-13 para medicamentos vendidos ao consumidor (obrigatório pela Anvisa). Pharmacode em embalagens internas de controle de produção. DataMatrix (2D) está sendo adotado para rastreabilidade (SNCM)."
        icone: ""
      - titulo: "Bibliotecas e centros de documentação"
        descricao: "Codabar tradicionalmente usado em cartões de identificação e etiquetas de livros. Code 39 também é comum. ISBN (baseado em EAN-13) obrigatório em livros comerciais."
        icone: ""
      - titulo: "Controle de ativos em empresas"
        descricao: "Code 39 ou Code 128 em patrimônios, equipamentos, crachás de funcionários, mobiliário e itens de TI. Leitores portáteis (pistola USB ou Bluetooth) fazem o inventário."
        icone: ""
      - titulo: "Eventos e ingressos"
        descricao: "QR Code ou Code 128 em ingressos para controle de acesso. Gera um código único por participante e valida na entrada. Evita fraude por duplicação."
        icone: ""
      - titulo: "Saúde (clínicas e hospitais)"
        descricao: "Code 128 em pulseiras de pacientes, prontuários e amostras laboratoriais. Reduz erros de identificação e acelera atendimento em UTI e coleta."
        icone: ""
      - titulo: "Educação e escolas"
        descricao: "Code 39 ou Code 128 em carteirinhas de aluno, empréstimo de livros e controle de merenda. Compatível com leitores USB baratos."
        icone: ""
