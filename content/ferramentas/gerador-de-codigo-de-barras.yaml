    titulo: "EAN-13 e EAN-8"
    subtitulo: ""
    conteudo: "**EAN-13 e EAN-8**: padrões internacionais para produtos de consumo (GTIN), administrados pela GS1. Para detalhes sobre estrutura, dígito verificador, prefixos brasileiros e registro, consulte nosso [Gerador de EAN-13 e EAN-8](/gerador-de-ean)."
    stepColor: "amber"
