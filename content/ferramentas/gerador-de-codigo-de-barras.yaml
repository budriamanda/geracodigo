    columns: "2"
    items:
      - titulo: "Code 128"
        descricao: "Alta densidade, suporta letras, números e caracteres especiais. Usado em logística, etiquetas de envio e controle de estoque."
        icone: ""
      - titulo: "Code 39"
        descricao: "Formato amplamente suportado. Usado em identificação de ativos, crachás e ambientes industriais."
        icone: ""
      - titulo: "Code 93"
        descricao: "Evolução do Code 39 com maior densidade de dados. Usado em logística e Canada Post."
        icone: ""
      - titulo: "UPC-A"
        descricao: "Padrão norte-americano com 12 dígitos. Necessário para vender no mercado dos EUA."
        icone: ""
      - titulo: "UPC-E"
        descricao: "Versão compacta do UPC-A para embalagens pequenas. 8 dígitos."
        icone: ""
      - titulo: "ITF-14"
        descricao: "Usado em caixas de transporte e embalagens de nível logístico. 14 dígitos. Padrão GS1."
        icone: ""
      - titulo: "MSI Plessey"
        descricao: "Usado em controle de estoque e prateleiras de supermercado. Apenas números."
        icone: ""
      - titulo: "Codabar"
        descricao: "Usado em bibliotecas, bancos de sangue e serviços de entrega (FedEx). Formato auto-verificável."
        icone: ""
      - titulo: "Pharmacode"
        descricao: "Código específico para a indústria farmacêutica. Codifica números de 3 a 131070."
        icone: ""
      - titulo: "ISBN"
        descricao: "Identificação internacional de livros. Baseado no EAN-13 com prefixo 978/979."
        icone: ""
