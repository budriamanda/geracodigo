  - tipo: prose
    titulo: "Qual Formato Escolher?"
    subtitulo: ""
    conteudo: "Se você não sabe qual formato usar, estas são as escolhas mais seguras para cada cenário:\n\n- **Vou vender em marketplaces ou varejo físico:** use **EAN-13** e registre na GS1 Brasil.\n- **Preciso só controlar meu estoque interno:** use **Code 128** — suporta letras e números, tem boa densidade e é lido por qualquer leitor moderno.\n- **Etiquetar crachás ou ativos corporativos:** **Code 39** é o mais antigo e mais compatível, mesmo com leitores muito simples.\n- **Caixas e pallets de transporte:** **ITF-14** (padrão GS1 para unidade logística).\n- **Exportar para os EUA:** **UPC-A** é o padrão norte-americano obrigatório em varejistas como Walmart.\n- **Produtos com embalagem muito pequena:** **EAN-8** (varejo) ou **UPC-E** (EUA).\n- **Indústria farmacêutica:** **Pharmacode** para controle interno, **EAN-13** para venda ao consumidor.\n- **Bibliotecas:** **Codabar** por compatibilidade com sistemas legados de catalogação."
    stepColor: "indigo"
    bgCard: true
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: prose
    titulo: "Compatibilidade com Leitores de Código de Barras"
    subtitulo: ""
    conteudo: "Todos os formatos gerados pelo GeraCode seguem as especificações ISO/IEC oficiais, garantindo compatibilidade com leitores de qualquer marca — desde pistolas CCD baratas (Bematech, Zebra, Honeywell, Elgin, Argox) até leitores industriais sem fio e aplicativos de celular.\n\nPara **leitores baseados em imagem** (smartphones ou câmeras 2D), todos os formatos 1D e também QR Codes são lidos normalmente. Para **leitores a laser tradicionais**, apenas códigos 1D funcionam — QR Codes (2D) exigem leitores image-based (ZCS, Zebra DS-série, smartphones).\n\nUse nosso [Leitor de Código de Barras online](/leitor-de-codigo-de-barras) para testar códigos diretamente pelo navegador, sem precisar de hardware adicional."
    stepColor: "indigo"
