faqFallbacks:
  - pergunta: "O leitor funciona no iPhone?"
    resposta: "Não no Safari — o Safari em iOS não suporta a API BarcodeDetector (padrão W3C). Use o Google Chrome para iOS (gratuito na App Store) para ler EAN-13, Code 128, QR Code e outros formatos. O app de câmera nativo do iPhone lê QR Codes, mas não decodifica códigos de barras 1D como EAN-13 ou Code 128."
  - pergunta: "Quais formatos de código de barras o leitor suporta?"
    resposta: "O leitor suporta: EAN-13, EAN-8, UPC-A, UPC-E, Code 128, Code 39, Code 93, ITF (Interleaved 2 of 5), Codabar e QR Code. A detecção é automática — você não precisa selecionar o formato antes de escanear."
  - pergunta: "Os dados lidos ficam salvos em algum servidor?"
    resposta: "Não. Todo o processamento acontece no seu dispositivo usando a API BarcodeDetector do navegador. Nenhuma imagem de câmera ou código lido é enviado para servidores externos."
  - pergunta: "O leitor funciona sem internet?"
    resposta: "Após carregar a página, a leitura funciona offline. O processamento da câmera é 100% local. Se você ficou sem internet após abrir o leitor, ele continua funcionando normalmente."
  - pergunta: "Por que o leitor não reconhece meu código danificado?"
    resposta: "Códigos com riscos, dobras, manchas ou impressão de baixa qualidade podem não ser detectados por câmera. Nesse caso, use a entrada manual: copie os números visíveis abaixo do código de barras e cole no campo de texto do leitor para validar o formato."
  - pergunta: "Posso ler vários códigos em sequência?"
    resposta: "Sim. O leitor mantém a câmera ativa e adiciona cada código detectado à lista de resultados. Você pode escanear quantos códigos quiser em sequência e copiar ou exportar os resultados ao final."
  - pergunta: "Consigo ler o código de barras de uma nota fiscal ou PDF?"
    resposta: "O leitor usa câmera ao vivo — não suporta upload de imagem ou PDF. Para ler código de uma nota fiscal: aponte a câmera para o papel impresso ou para a tela do computador onde o PDF está aberto. O código linear (Code 128 / Code 39) na DANFE e o QR Code da NF-e 4.0 são lidos normalmente dessa forma."
  - pergunta: "O leitor consegue ler código de barras danificado ou borrado?"
    resposta: "Depende do grau do dano. A API BarcodeDetector usa algoritmos de reconhecimento de imagem do sistema operacional, que têm alguma tolerância a danos menores (riscos leves, baixo contraste). Para códigos com danos severos, use a entrada manual: copie os números visíveis abaixo do código e cole no campo de texto."
