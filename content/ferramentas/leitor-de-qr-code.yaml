faqFallbacks:
  - pergunta: "O leitor de QR Code funciona no iPhone?"
    resposta: "Não no Safari — o Safari em iOS não suporta a API BarcodeDetector. Use o Google Chrome para iOS (gratuito na App Store) para ler QR Codes com exibição completa do conteúdo (Pix, Wi-Fi, texto, link). O app de câmera nativo do iPhone lê QR Codes de URL simples, mas não exibe todos os tipos de conteúdo."
  - pergunta: "Quais tipos de QR Code este leitor suporta?"
    resposta: "O leitor lê qualquer QR Code: links e URLs, QR Code Pix (payload BR Code EMV), QR Code Wi-Fi (SSID + senha), QR Code de texto, e-mail, telefone e vCard. A detecção do tipo é automática."
  - pergunta: "Os dados lidos ficam salvos em algum servidor?"
    resposta: "Não. Todo o processamento acontece no seu dispositivo usando a API BarcodeDetector do navegador. Nenhuma imagem de câmera ou conteúdo do QR Code é enviado para servidores externos."
  - pergunta: "O leitor funciona sem internet?"
    resposta: "Após carregar a página, a leitura funciona offline. O processamento da câmera é 100% local. Se você ficou sem internet após abrir o leitor, ele continua funcionando normalmente."
  - pergunta: "Como ler QR Code de uma foto ou print?"
    resposta: "O leitor usa câmera ao vivo e não suporta upload de imagem. Para ler QR Code de uma foto: use o Google Lens (Android e iOS) — abra a foto na galeria e toque em 'Pesquisar com Lens'. No computador, acesse lens.google.com e faça upload da imagem."
  - pergunta: "O leitor consegue ler QR Code Pix?"
    resposta: "Sim. O leitor exibe o conteúdo completo do payload BR Code EMV: nome do recebedor, chave Pix, cidade e valor (quando definido). Útil para conferir QR Codes Pix antes de imprimir ou distribuir."
