  - tipo: prose
    titulo: "Leitor de QR Code pelo celular: sem app, direto no navegador"
    subtitulo: ""
    conteudo: "A câmera nativa do iPhone lê QR Codes simples (URL), mas não abre o conteúdo de QR Codes Pix, Wi-Fi ou texto diretamente. O leitor do GeraCode exibe o conteúdo completo do QR Code na tela, independente do tipo.\n\nO leitor usa a **API BarcodeDetector**, uma interface nativa dos navegadores modernos que processa os frames da câmera diretamente no hardware do dispositivo. Isso significa que nenhuma imagem é enviada para servidores externos — todo o processamento é local.\n\n**Compatibilidade por navegador:**\n\n- **Chrome 83+ (Android e Desktop):** suporte completo ✓\n- **Edge 83+:** suporte completo ✓\n- **Opera 69+:** suporte completo ✓\n- **Chrome para iOS:** suporte completo ✓\n- **Safari (macOS e iOS):** sem suporte à BarcodeDetector; use Chrome ou Edge\n- **Firefox:** sem suporte nativo; use Chrome ou Edge\n\nNo **iPhone**, use o **Google Chrome para iOS** (gratuito na App Store). O app de câmera nativo do iPhone lê alguns QR Codes mas não exibe o conteúdo completo (Pix, Wi-Fi, texto)."
    stepColor: "sky"
    bgCard: true
    columns: "3"
    items: []
    tags: []
    links: []
  - tipo: cards
    titulo: "Solução de problemas"
    subtitulo: ""
    conteudo: ""
    stepColor: "amber"
    bgCard: false
    columns: "2"
    items:
      - titulo: "QR Code não é detectado"
        descricao: "Tente: (1) melhorar a iluminação — evite sombras; (2) manter distância de 10–20 cm; (3) segurar o celular estável por 2–3 segundos; (4) limpar a lente da câmera. QR Codes danificados, muito pequenos ou com brilho excessivo podem falhar."
        icone: ""
      - titulo: "iPhone / Safari não funciona"
        descricao: "O Safari em iOS não suporta a API BarcodeDetector. Use o Google Chrome para iOS (grátis na App Store). O app de câmera nativo do iPhone lê QR Codes de URL mas não exibe o conteúdo completo."
        icone: ""
      - titulo: "Câmera não abre"
        descricao: "O navegador precisa de permissão para acessar a câmera. Clique no cadeado (🔒) na barra de endereço → \"Permissões do site\" → libere a câmera. Em celulares, verifique também as configurações de permissão do app do navegador."
        icone: ""
      - titulo: "QR Code muito pequeno"
        descricao: "QR Codes impressos com menos de 2 cm de lado podem não ser detectados pela câmera. Aproxime mais o celular ou tente ampliar o QR Code na tela se estiver lendo de outro dispositivo."
        icone: ""
