  - tipo: prose
    titulo: "Antes de escanear: como identificar QR Codes falsos (quishing)"
    subtitulo: ""
    conteudo: "**Quishing** é o phishing via QR Code — golpistas substituem QR Codes legítimos (Pix, cardápio, pagamento de estacionamento) por códigos falsos que redirecionam para sites fraudulentos. No Brasil, os casos cresceram com a popularização do Pix via QR.\n\n**Sinais de alerta:**\n- QR Code colado sobre outro código (especialmente em totens de pagamento e mesas de restaurante)\n- QR Code em papel impresso de qualidade baixa em locais onde o original seria profissional\n- URL estranha após escanear — sempre veja o link antes de clicar\n- QR Pix que pede senha ou dados além do app bancário\n\n**Use o leitor para verificar antes de agir:** escaneie o QR Code com o leitor do GeraCode para ver o conteúdo completo antes de abrir o link ou confirmar o pagamento. Se o link do QR Pix não começar com o domínio do seu banco ou for uma URL encurtada desconhecida, desconfie.\n\nEsta prática é especialmente importante em QR Codes em locais públicos: estacionamentos, caixas de supermercado, mesas de restaurante e panfletos na rua."
    stepColor: "amber"
