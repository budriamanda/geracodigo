slug: cb-imprimir-etiquetas
pergunta: "Posso imprimir etiquetas diretamente?"
resposta: "Sim. Após gerar os códigos (individual ou em lote), use os botões de impressão de etiquetas com layouts 2x5 ou 3x5 por página A4. Uma janela de impressão será aberta automaticamente."
