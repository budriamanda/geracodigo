quandoUsarA: |
  - Você quer receber pagamento via Pix no balcão, mesa ou adesivo.
  - Quer levar o cliente para um link, cardápio, WhatsApp ou rede social.
  - Precisa compartilhar Wi-Fi, contato ou texto sem digitação.
  - Quer algo lido pela câmera do celular, sem leitor dedicado.
quandoUsarB: |
  - Você vende produtos e precisa passar no caixa (PDV).
  - Faz controle de estoque com leitor a laser.
  - Vai cadastrar produto em marketplace que pede EAN-13.
  - Precisa de etiqueta de preço padronizada para o varejo.
veredito: |
  Não é um substituir o outro: eles convivem. Use **código de barras (EAN-13)** para identificar o produto no caixa e no estoque, e **QR Code** para pagamento, divulgação e qualquer coisa que envolva link ou mais dados. Uma embalagem bem resolvida muitas vezes traz os dois: o código de barras para o varejo e um QR Code levando ao site, ao manual ou ao Pix.
