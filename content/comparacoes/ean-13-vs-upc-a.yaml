conteudoExtra: |
  ## O que é EAN-13?

  O EAN-13 (European Article Number) é o código de barras de varejo com 13 dígitos usado no Brasil e na maioria dos países. Ele identifica o país de registro, a empresa e o produto, mais um dígito verificador que confirma a leitura. No Brasil, os prefixos começam em **789** e **790**, administrados pela GS1 Brasil.

  ## O que é UPC-A?

  O UPC-A (Universal Product Code) é o código de barras de 12 dígitos criado nos Estados Unidos, o primeiro padrão de varejo a se popularizar. Ele segue a mesma lógica do EAN-13, com sistema numérico, empresa, produto e dígito verificador, mas com um dígito a menos.

  ## EAN-13 e UPC-A são a mesma coisa?

  São da mesma família e compatíveis, mas não idênticos. Tecnicamente, um UPC-A é um EAN-13 com um **zero na frente**. Por isso um leitor que entende EAN-13 lê um UPC-A sem problema. A diferença é histórica e geográfica, não de funcionamento.

  ## Qual usar para vender no Brasil?

  Use **EAN-13**. É o padrão exigido pelo varejo e pelos marketplaces brasileiros. Para vender no varejo formal você precisa de um prefixo registrado na **GS1 Brasil**; só então o código é único e reconhecido na cadeia. Para testes, etiquetas internas ou controle próprio, dá para gerar um EAN-13 com dígito verificador correto sem registro.
