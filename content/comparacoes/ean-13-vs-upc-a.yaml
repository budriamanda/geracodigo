h1: "EAN-13 vs UPC-A: qual código usar no seu produto?"
subtitle: "Comparação entre os dois principais padrões de código de barras de varejo para você saber qual cadastrar e imprimir."
introducao: |
  **EAN-13** e **UPC-A** são padrões de código de barras de varejo da mesma família (GS1). A diferença prática é a origem e o tamanho: o UPC-A tem 12 dígitos e nasceu nos Estados Unidos; o EAN-13 tem 13 dígitos e é o padrão usado no Brasil, na Europa e na maior parte do mundo. Na verdade, todo UPC-A é um EAN-13 com um zero na frente, e leitores modernos leem os dois.
