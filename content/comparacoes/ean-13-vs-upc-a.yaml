quandoUsarA: |
  - Você vende no Brasil, na Europa ou exporta para a maioria dos países.
  - Vai cadastrar produto em marketplace ou rede de varejo brasileira.
  - Quer o padrão mais universal e aceito globalmente.
  - Já tem (ou vai registrar) prefixo na GS1 Brasil.
quandoUsarB: |
  - Seu mercado-alvo principal é Estados Unidos ou Canadá.
  - Um varejista americano específico pediu UPC-A no cadastro.
  - Você já tem prefixo GS1 US.
  - Precisa caber em embalagem que segue o padrão norte-americano.
veredito: |
  Para quem vende no Brasil, a resposta é simples: use **EAN-13**. É o padrão nacional, aceito em todo o varejo e nos marketplaces, e funciona também no exterior. O **UPC-A** só faz sentido quando o foco é o mercado dos Estados Unidos ou Canadá. Como os dois são compatíveis e o EAN-13 engloba o UPC-A, padronizar no EAN-13 evita retrabalho.
