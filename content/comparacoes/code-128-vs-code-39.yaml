quandoUsarA: |
  - Você precisa de muito conteúdo (letras e números) em pouco espaço.
  - Trabalha com logística, transporte ou cadeia de suprimentos.
  - Quer um código mais compacto e com verificação embutida.
  - Vai seguir o padrão GS1-128 para embalagem e remessa.
quandoUsarB: |
  - Precisa de algo simples para etiqueta interna ou de ativo.
  - O ambiente tem leitores antigos que exigem Code 39.
  - O conteúdo é curto e só usa letras maiúsculas e números.
  - Você quer a maior compatibilidade possível, sem se preocupar com densidade.
veredito: |
  Para a maioria dos casos novos, escolha **Code 128**: ele cabe mais informação em menos espaço, tem dígito verificador automático e é a base da logística moderna. Use **Code 39** quando o conteúdo for curto, o ambiente tiver leitores legados ou você quiser a simplicidade máxima. Nenhum dos dois serve para identificar produto no caixa do varejo; para isso, use EAN-13.
